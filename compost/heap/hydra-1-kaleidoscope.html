<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydra-style Video Synthesis</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
        }
        canvas {
            display: block;
        }
        .info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-family: 'Segoe UI', sans-serif;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="info">Hydra-style Kaleidoscopic Video Synthesis</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = 800;
        canvas.height = 600;

        let time = 0;
        let feedbackBuffer = null;

        function createFeedbackBuffer() {
            const buffer = document.createElement('canvas');
            buffer.width = canvas.width;
            buffer.height = canvas.height;
            return buffer;
        }

        // Simplex-like noise function
        function noise(x, y, z) {
            const p = [
                [151,160,137,91,90,15,131,13,201,95,96,53,194,233,7,225,140,36,103,30,69,142,8,99,37,240,21,10,23,190,6,148,247,120,234,75,0,26,197,62,94,252,219,203,117,35,11,32,57,177,33,88,237,149,56,87,174,20,125,136,171,168,68,175,74,165,71,134,139,48,27,166,77,146,158,231,83,111,229,122,60,211,133,230,220,105,92,41,55,46,245,40,244,102,143,54,65,25,63,161,1,216,80,73,209,76,132,187,208,89,18,169,200,196,135,130,116,188,159,86,164,100,109,198,173,186,3,64,52,217,226,250,124,123,5,202,38,147,118,126,255,82,85,212,207,206,59,227,47,16,58,17,182,189,28,42,223,183,170,213,119,248,152,2,44,154,163,70,221,153,101,155,167,43,172,9,129,22,39,253,19,98,108,110,79,113,224,232,178,185,112,104,218,246,97,228,251,34,242,193,238,210,144,12,191,179,162,241,81,51,145,235,249,14,239,107,49,192,214,31,181,199,106,157,184,84,204,176,115,121,50,45,127,4,150,254,138,236,205,93,222,114,67,29,24,72,243,141,128,195,78,66,215,61,156,180]
            ];

            const X = Math.floor(x) & 255;
            const Y = Math.floor(y) & 255;
            const Z = Math.floor(z) & 255;

            x -= Math.floor(x);
            y -= Math.floor(y);
            z -= Math.floor(z);

            const u = fade(x);
            const v = fade(y);
            const w = fade(z);

            const A = p[X] + Y;
            const AA = p[A] + Z;
            const AB = p[A + 1] + Z;
            const B = p[X + 1] + Y;
            const BA = p[B] + Z;
            const BB = p[B + 1] + Z;

            return lerp(w,
                lerp(v,
                    lerp(u, grad(p[AA], x, y, z), grad(p[BA], x - 1, y, z)),
                    lerp(u, grad(p[AB], x, y - 1, z), grad(p[BB], x - 1, y - 1, z))
                ),
                lerp(v,
                    lerp(u, grad(p[AA + 1], x, y, z - 1), grad(p[BA + 1], x - 1, y, z - 1)),
                    lerp(u, grad(p[AB + 1], x, y - 1, z - 1), grad(p[BB + 1], x - 1, y - 1, z - 1))
                )
            );
        }

        function fade(t) {
            return t * t * t * (t * (t * 6 - 15) + 10);
        }

        function lerp(t, a, b) {
            return a + t * (b - a);
        }

        function grad(hash, x, y, z) {
            const h = hash & 15;
            const u = h < 8 ? x : y;
            const v = h < 4 ? y : h === 12 || h === 14 ? x : z;
            return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
        }

        function hsvToRgb(h, s, v) {
            let r, g, b;
            const i = Math.floor(h * 6);
            const f = h * 6 - i;
            const p = v * (1 - s);
            const q = v * (1 - f * s);
            const t = v * (1 - (1 - f) * s);

            switch (i % 6) {
                case 0: r = v; g = t; b = p; break;
                case 1: r = q; g = v; b = p; break;
                case 2: r = p; g = v; b = t; break;
                case 3: r = p; g = q; b = v; break;
                case 4: r = t; g = p; b = v; break;
                case 5: r = v; g = p; b = q; break;
            }

            return [Math.floor(r * 255), Math.floor(g * 255), Math.floor(b * 255)];
        }

        function drawKaleidoscope() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const segments = 4;
            const angleStep = (Math.PI * 2) / segments;

            // Draw each kaleidoscope segment
            for (let seg = 0; seg < segments; seg++) {
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(seg * angleStep);

                // Draw the pattern
                for (let y = 0; y < canvas.height; y += 4) {
                    for (let x = 0; x < canvas.width / 2; x += 4) {
                        const nx = x * 0.01;
                        const ny = y * 0.01;
                        const nz = time * 0.05;

                        // Base oscillator
                        const osc1 = noise(nx * 2, ny * 2, nz) * 2 - 1;

                        // Modulation oscillator
                        const modX = Math.cos(time * 0.5) * 0.5;
                        const modY = Math.sin(time * 0.3) * 0.5;
                        const osc2 = noise(nx + modX, ny + modY, nz * 0.7) * 2 - 1;

                        // Audio-reactive-like modulation
                        const audioMod = Math.sin(time * 10 + nx * 5) * 0.1 + 0.1;
                        const combined = osc1 + osc2 * audioMod;

                        // Color enhancement
                        const hue = (combined * 0.5 + 0.5 + time * 0.1) % 1;
                        const saturation = 0.7 + combined * 0.3;
                        const brightness = 0.5 + combined * 0.5;

                        const [r, g, b] = hsvToRgb(hue, saturation, brightness);

                        // Draw pixel
                        const px = x;
                        const py = y - canvas.height / 2;
                        ctx.fillStyle = `rgb(${r},${g},${b})`;
                        ctx.fillRect(cx + px, cy + py, 4, 4);

                        // Mirror for kaleidoscope effect
                        ctx.fillRect(cx - px, cy + py, 4, 4);
                    }
                }

                ctx.restore();
            }
        }

        function draw() {
            // Semi-transparent black for trail effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawKaleidoscope();

            time += 0.016;
            requestAnimationFrame(draw);
        }

        // Start animation
        draw();

        // Interactive: click to reset
        canvas.addEventListener('click', () => {
            time = Math.random() * 100;
        });
    </script>
</body>
</html>
