<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strudel-style Audio Demo</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0f, #1a1a2e);
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }
        .container {
            text-align: center;
            max-width: 600px;
        }
        h2 {
            margin-bottom: 1rem;
            color: #8b5cf6;
        }
        p {
            color: #a0a0b0;
            margin-bottom: 2rem;
        }
        button {
            padding: 1rem 2rem;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .visualizer {
            margin-top: 2rem;
            display: flex;
            gap: 4px;
            height: 100px;
            align-items: flex-end;
            justify-content: center;
        }
        .bar {
            width: 8px;
            background: linear-gradient(to top, #8b5cf6, #06b6d4);
            border-radius: 4px;
            transition: height 0.05s;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎵 Hypnotic Minimal Techno</h2>
        <p>A Web Audio API interpretation of the Strudel pattern</p>
        <button id="playBtn">▶ Play Pattern</button>
        <div class="visualizer" id="visualizer"></div>
    </div>

    <script>
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        let isPlaying = false;
        let scheduler = null;
        let analyser = null;

        // Create visualizer bars
        const visualizer = document.getElementById('visualizer');
        const bars = [];
        for (let i = 0; i < 32; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = '10px';
            visualizer.appendChild(bar);
            bars.push(bar);
        }

        function createAnalyser() {
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 64;
            return analyser;
        }

        function updateVisualizer() {
            if (!analyser) return;

            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);

            for (let i = 0; i < bars.length; i++) {
                const value = dataArray[i] || 0;
                bars[i].style.height = Math.max(10, value / 3) + 'px';
            }

            if (isPlaying) {
                requestAnimationFrame(updateVisualizer);
            }
        }

        function playKick(time) {
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            osc.connect(gain);
            gain.connect(analyser || audioContext.destination);

            osc.frequency.setValueAtTime(150, time);
            osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.5);

            gain.gain.setValueAtTime(0.8, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.5);

            osc.start(time);
            osc.stop(time + 0.5);
        }

        function playSnare(time) {
            const noise = audioContext.createBufferSource();
            const buffer = audioContext.createBuffer(1, audioContext.sampleRate * 0.1, audioContext.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < buffer.length; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            noise.buffer = buffer;

            const filter = audioContext.createBiquadFilter();
            filter.type = 'highpass';
            filter.frequency.value = 1000;

            const gain = audioContext.createGain();
            gain.gain.setValueAtTime(0.4, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);

            noise.connect(filter);
            filter.connect(gain);
            gain.connect(analyser || audioContext.destination);

            noise.start(time);
            noise.stop(time + 0.1);
        }

        function playHiHat(time, open = false) {
            const noise = audioContext.createBufferSource();
            const buffer = audioContext.createBuffer(1, audioContext.sampleRate * (open ? 0.1 : 0.05), audioContext.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < buffer.length; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            noise.buffer = buffer;

            const filter = audioContext.createBiquadFilter();
            filter.type = 'highpass';
            filter.frequency.value = 7000;

            const gain = audioContext.createGain();
            gain.gain.setValueAtTime(0.3, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + (open ? 0.1 : 0.05));

            noise.connect(filter);
            filter.connect(gain);
            gain.connect(analyser || audioContext.destination);

            noise.start(time);
            noise.stop(time + (open ? 0.1 : 0.05));
        }

        function playBass(time, freq = 65.41) { // C2
            const osc = audioContext.createOscillator();
            osc.type = 'sawtooth';
            osc.frequency.value = freq;

            const filter = audioContext.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(800, time);
            filter.frequency.exponentialRampToValueAtTime(200, time + 0.1);

            const gain = audioContext.createGain();
            gain.gain.setValueAtTime(0.4, time);
            gain.gain.exponentialRampToValueAtTime(0.01, time + 0.2);

            osc.connect(filter);
            filter.connect(gain);
            gain.connect(analyser || audioContext.destination);

            osc.start(time);
            osc.stop(time + 0.2);
        }

        function playChord(time) {
            const notes = [261.63, 329.63, 392.00, 493.88]; // Amaj7
            notes.forEach((freq, i) => {
                const osc = audioContext.createOscillator();
                osc.type = 'triangle';
                osc.frequency.value = freq;

                const gain = audioContext.createGain();
                gain.gain.setValueAtTime(0.15, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.5);

                osc.connect(gain);
                gain.connect(analyser || audioContext.destination);

                osc.start(time + i * 0.01);
                osc.stop(time + 0.5);
            });
        }

        let stepTime = 0;
        const stepDuration = 0.125; // 8th notes at 120 BPM

        function schedulePattern() {
            const currentTime = audioContext.currentTime;
            const lookahead = 0.1;

            while (stepTime * stepDuration < currentTime + lookahead) {
                const time = stepTime * stepDuration;
                const step = Math.floor(stepTime) % 16;

                // Hi-hat pattern: hh ~ hh ~ (every 8th note, but with rests)
                if (step % 2 === 0 && step % 8 < 4) {
                    playHiHat(time);
                }

                // Kick/snare: bd ~ sd bd ~
                if (step === 0 || step === 6 || step === 8 || step === 14) {
                    playKick(time);
                }
                if (step === 4 || step === 12) {
                    playSnare(time);
                }

                // Bassline: rolling pattern in C
                if (step % 2 === 0) {
                    const bassNotes = [65.41, 65.41, 77.78, 65.41]; // C2, C2, Eb2, C2
                    playBass(time, bassNotes[Math.floor(step / 4) % 4]);
                }

                // Chord stabs every 8 bars (we'll do every 16 steps for demo)
                if (step === 0) {
                    playChord(time);
                }

                stepTime++;
            }

            if (isPlaying) {
                scheduler = requestAnimationFrame(schedulePattern);
            }
        }

        document.getElementById('playBtn').addEventListener('click', () => {
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            isPlaying = !isPlaying;
            const btn = document.getElementById('playBtn');

            if (isPlaying) {
                btn.textContent = '■ Stop';
                createAnalyser();
                analyser.connect(audioContext.destination);
                stepTime = Math.ceil(audioContext.currentTime / stepDuration);
                schedulePattern();
                updateVisualizer();
            } else {
                btn.textContent = '▶ Play Pattern';
                if (scheduler) {
                    cancelAnimationFrame(scheduler);
                }
            }
        });
    </script>
</body>
</html>
