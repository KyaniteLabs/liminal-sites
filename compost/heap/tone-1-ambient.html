<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tone.js Ambient Pad Demo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0f, #1a1a2e);
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }
        .container {
            text-align: center;
            max-width: 600px;
        }
        h2 {
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        p {
            color: #a0a0b0;
            margin-bottom: 2rem;
        }
        button {
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .visualizer {
            margin-top: 2rem;
            display: flex;
            gap: 3px;
            height: 120px;
            align-items: flex-end;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 1rem;
        }
        .bar {
            width: 12px;
            background: linear-gradient(to top, #8b5cf6, #3b82f6, #06b6d4);
            border-radius: 6px;
            transition: height 0.1s ease-out;
            min-height: 4px;
        }
        .info {
            margin-top: 1rem;
            color: #a0a0b0;
            font-size: 0.875rem;
        }
        .playing-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎹 Ambient Generative Music</h2>
        <p>Tone.js synthesis with polyphonic pads, arpeggios, and spatial effects</p>
        <button id="playBtn">▶ Start Music</button>
        <div class="visualizer" id="visualizer"></div>
        <div class="info" id="info">Click to start - uses Tone.js synthesis engine</div>
    </div>

    <script>
        let isPlaying = false;
        let toneStarted = false;

        // Create visualizer bars
        const visualizer = document.getElementById('visualizer');
        const bars = [];
        for (let i = 0; i < 24; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = '10px';
            visualizer.appendChild(bar);
            bars.push(bar);
        }

        // Audio nodes
        let polySynth, bassSynth, arpSynth;
        let reverb, delay, delay2;
        let arpeggioLoop, padLoop, bassLoop;
        let analyser;

        async function initAudio() {
            await Tone.start();

            // Create effects chain
            reverb = new Tone.Reverb({
                decay: 4,
                wet: 0.4
            }).toDestination();

            delay = new Tone.FeedbackDelay({
                delayTime: '8n.',
                feedback: 0.3,
                wet: 0.3
            }).connect(reverb);

            delay2 = new Tone.PingPongDelay({
                delayTime: '4n',
                feedback: 0.2,
                wet: 0.2
            }).connect(reverb);

            analyser = new Tone.Analyser('fft', 256);
            Tone.Destination.connect(analyser);

            // Polyphonic pad synth with rich harmonics
            polySynth = new Tone.PolySynth(Tone.Synth, {
                oscillator: {
                    type: 'fmsquare',
                    modulationType: 'triangle',
                    modulationIndex: 3,
                    harmonicity: 2
                },
                envelope: {
                    attack: 0.8,
                    decay: 0.3,
                    sustain: 0.6,
                    release: 2
                },
                volume: -12
            }).connect(delay);

            // Deep bass synth
            bassSynth = new Tone.MonoSynth({
                oscillator: { type: 'sine' },
                envelope: {
                    attack: 0.1,
                    decay: 0.3,
                    sustain: 0.4,
                    release: 1
                },
                volume: -6
            }).connect(reverb);

            // Bright arpeggio synth
            arpSynth = new Tone.Synth({
                oscillator: { type: 'triangle' },
                envelope: {
                    attack: 0.02,
                    decay: 0.1,
                    sustain: 0.3,
                    release: 0.5
                },
                volume: -15
            }).connect(delay2);

            toneStarted = true;
        }

        // Chord progressions (ambient pads)
        const chordProgression = [
            ['C4', 'E4', 'G4', 'B4'],     // CMaj7
            ['A3', 'C4', 'E4', 'G4'],     // Am7
            ['F3', 'A3', 'C4', 'E4'],     // FMaj7
            ['G3', 'B3', 'D4', 'F4'],     // G7
            ['D4', 'F4', 'A4', 'C5'],     // Dm7
            ['B3', 'D4', 'F4', 'A4'],     // Bm7b5
            ['C4', 'E4', 'G4', 'B4'],     // CMaj7
            ['A3', 'C4', 'E4', 'G4'],     // Am7
        ];

        const bassNotes = ['C2', 'A2', 'F2', 'G2', 'D2', 'B2', 'C2', 'A2'];

        // Arpeggio patterns
        const arpPatterns = [
            ['C5', 'E5', 'G5', 'B5', 'G5', 'E5'],
            ['A4', 'C5', 'E5', 'G5', 'E5', 'C5'],
            ['C5', 'F5', 'A5', 'C5', 'A5', 'F5'],
            ['G4', 'B4', 'D5', 'G5', 'D5', 'B4'],
            ['D5', 'F5', 'A5', 'D5', 'A5', 'F5'],
            ['B4', 'D5', 'F5', 'A5', 'F5', 'D5'],
            ['C5', 'E5', 'G5', 'C5', 'G5', 'E5'],
            ['A4', 'C5', 'E5', 'A4', 'E5', 'C5'],
        ];

        let currentChord = 0;

        function startSequences() {
            // Pad chord progression (changes every 4 beats)
            padLoop = new Tone.Loop(time => {
                const chord = chordProgression[currentChord];
                polySynth.triggerAttackRelease(chord, '2n', time);

                // Add occasional tension note
                if (Math.random() > 0.7) {
                    const tensionNote = chord[0].replace('4', '5').replace('3', '4');
                    polySynth.triggerAttackRelease(tensionNote, '4n', time + Tone.Ticks('4n'));
                }

                currentChord = (currentChord + 1) % chordProgression.length;
            }, '1m').start(0);

            // Bass line (every 2 beats, with rhythm)
            let bassIndex = 0;
            bassLoop = new Tone.Loop(time => {
                const bassNote = bassNotes[bassIndex];
                bassSynth.triggerAttackRelease(bassNote, '2n', time);

                // Occasional octave drop
                if (Math.random() > 0.8) {
                    bassSynth.triggerAttackRelease(
                        bassNote.replace('2', '1'),
                        '4n',
                        time + Tone.Ticks('3n')
                    );
                }

                bassIndex = (bassIndex + 1) % bassNotes.length;
            }, '2n').start(0);

            // Arpeggio (faster, repeating pattern)
            let arpIndex = 0;
            let arpNoteIndex = 0;
            arpeggioLoop = new Tone.Loop(time => {
                const pattern = arpPatterns[arpIndex];
                const note = pattern[arpNoteIndex];

                // Random velocity variation
                const velocity = 0.3 + Math.random() * 0.4;
                arpSynth.triggerAttackRelease(note, '8n', time, velocity);

                arpNoteIndex = (arpNoteIndex + 1) % pattern.length;

                // Change pattern every chord change
                if (arpNoteIndex === 0) {
                    arpIndex = (arpIndex + 1) % arpPatterns.length;
                }
            }, '8n').start(0);
        }

        function stopSequences() {
            if (padLoop) padLoop.dispose();
            if (bassLoop) bassLoop.dispose();
            if (arpeggioLoop) arpeggioLoop.dispose();

            // Release all sustained notes
            polySynth.releaseAll();
            bassSynth.triggerRelease();
        }

        function updateVisualizer() {
            if (!analyser || !isPlaying) return;

            const values = analyser.getValue();

            for (let i = 0; i < bars.length; i++) {
                // Map frequency data to bars
                const dataIndex = Math.floor(i * values.length / bars.length);
                const value = values[dataIndex];
                const height = Math.max(10, (value + 100) * 1.5);
                bars[i].style.height = height + 'px';
            }

            requestAnimationFrame(updateVisualizer);
        }

        document.getElementById('playBtn').addEventListener('click', async () => {
            const btn = document.getElementById('playBtn');
            const info = document.getElementById('info');

            if (!toneStarted) {
                btn.textContent = 'Starting...';
                btn.disabled = true;
                await initAudio();
                btn.disabled = false;
            }

            isPlaying = !isPlaying;

            if (isPlaying) {
                btn.innerHTML = '■ Stop Music';
                info.innerHTML = '<span class="playing-indicator"></span>Playing - Polyphonic pads, bass, and arpeggios';
                startSequences();
                updateVisualizer();
            } else {
                btn.innerHTML = '▶ Start Music';
                info.textContent = 'Click to start - uses Tone.js synthesis engine';
                stopSequences();

                // Reset visualizer
                bars.forEach(bar => bar.style.height = '10px');
            }
        });
    </script>
</body>
</html>
