<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>p5.js Sketch</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
        }
        main {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <main>
        <script>
// Colorful geometric shapes with overlapping transparency
let shapes = [];
let time = 0;

function setup() {
  createCanvas(800, 600);
  pixelDensity(1);
  
  // Initialize shapes
  for (let i = 0; i < 50; i++) {
    shapes.push({
      x: random(width),
      y: random(height),
      size: random(30, 150),
      type: floor(random(4)),
      noiseOffsetX: random(1000),
      noiseOffsetY: random(1000),
      noiseOffsetColor: random(1000),
      hue: random(360)
    });
  }
}

function draw() {
  // Semi-transparent background for trail effect
  background(10, 10, 20, 30);
  
  time += 0.005;
  
  // Draw shapes
  for (let shape of shapes) {
    drawShape(shape);
  }
}

function drawShape(s) {
  // Use noise for movement
  let nx = noise(s.noiseOffsetX + time);
  let ny = noise(s.noiseOffsetY + time);
  
  // Map noise to screen coordinates
  let x = map(nx, 0, 1, 0, width);
  let y = map(ny, 0, 1, 0, height);
  
  // Color with noise-based variation
  let hueNoise = noise(s.noiseOffsetColor + time * 0.5);
  let hue = (s.hue + hueNoise * 60) % 360;
  let saturation = 70 + noise(s.noiseOffsetColor + 100) * 30;
  let brightness = 80 + noise(s.noiseOffsetColor + 200) * 20;
  
  colorMode(HSB, 360, 100, 100, 100);
  fill(hue, saturation, brightness, 60);
  noStroke();
  
  // Draw different shape types
  push();
  translate(x, y);
  rotate(time * 0.5 + s.noiseOffsetX);
  
  switch(s.type) {
    case 0: // Circle
      ellipse(0, 0, s.size);
      break;
    case 1: // Rectangle
      rectMode(CENTER);
      rect(0, 0, s.size, s.size * 0.7);
      break;
    case 2: // Triangle
      triangle(0, -s.size/2, -s.size/2, s.size/2, s.size/2, s.size/2);
      break;
    case 3: // Line-based shape
      rotate(time);
      for (let i = 0; i < 3; i++) {
        rotate(TWO_PI / 3);
        line(0, 0, s.size/2, 0);
      }
      break;
  }
  pop();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
        </script>
    </main>
</body>
</html>
