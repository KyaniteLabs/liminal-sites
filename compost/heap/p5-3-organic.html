<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>p5.js Sketch</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
        }
        main {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <main>
        <script>
// Organic patterns with Perlin noise - soft colors
let particles = [];
let numParticles = 1500;
let flowField = [];
let cols, rows;
let resolution = 20;
let t = 0;
let zoff = 0;

// Soft pastel palette
let colors = [];

function setup() {
  createCanvas(800, 600);
  pixelDensity(1);
  colorMode(RGB, 255, 255, 255, 100);

  // Define soft color palette
  colors = [
    [255, 182, 193], // soft pink
    [230, 230, 250], // lavender
    [176, 224, 230], // powder blue
    [255, 218, 185], // peach
    [152, 251, 152], // pale green
    [255, 250, 205], // lemon chiffon
    [221, 160, 221], // plum
    [175, 238, 238], // pale turquoise
  ];

  cols = floor(width / resolution);
  rows = floor(height / resolution);

  // Initialize particles
  for (let i = 0; i < numParticles; i++) {
    particles.push({
      x: random(width),
      y: random(height),
      vx: 0,
      vy: 0,
      colorIndex: floor(random(colors.length)),
      size: random(2, 5),
      life: random(100, 255)
    });
  }
}

function draw() {
  // Soft background with transparency for trails
  background(250, 248, 245, 30);

  zoff += 0.002;

  // Calculate flow field
  let yoff = 0;
  for (let y = 0; y < rows; y++) {
    let xoff = 0;
    for (let x = 0; x < cols; x++) {
      let index = x + y * cols;
      let angle = noise(xoff, yoff, zoff) * TWO_PI * 2;
      let v = p5.Vector.fromAngle(angle);
      v.setMag(0.5);
      flowField[index] = v;
      xoff += 0.1;
    }
    yoff += 0.1;
  }

  // Update and draw particles
  noStroke();
  for (let p of particles) {
    // Follow flow field
    let x = floor(p.x / resolution);
    let y = floor(p.y / resolution);
    x = constrain(x, 0, cols - 1);
    y = constrain(y, 0, rows - 1);
    let index = x + y * cols;
    let force = flowField[index];

    if (force) {
      p.vx += force.x * 0.3;
      p.vy += force.y * 0.3;
    }

    // Damping
    p.vx *= 0.95;
    p.vy *= 0.95;

    // Update position
    p.x += p.vx;
    p.y += p.vy;

    // Wrap around edges
    if (p.x > width) p.x = 0;
    if (p.x < 0) p.x = width;
    if (p.y > height) p.y = 0;
    if (p.y < 0) p.y = height;

    // Fade in/out
    p.life -= 0.5;
    if (p.life <= 0) {
      p.x = random(width);
      p.y = random(height);
      p.life = 255;
      p.colorIndex = floor(random(colors.length));
    }

    // Draw particle
    let c = colors[p.colorIndex];
    fill(c[0], c[1], c[2], p.life);
    ellipse(p.x, p.y, p.size);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  cols = floor(width / resolution);
  rows = floor(height / resolution);
}

function mousePressed() {
  // Reset particles on click
  for (let p of particles) {
    p.x = random(width);
    p.y = random(height);
    p.vx = 0;
    p.vy = 0;
    p.life = random(100, 255);
  }
}
        </script>
    </main>
</body>
</html>
