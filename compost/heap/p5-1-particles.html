<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>p5.js Flowing Particles</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
        }
        main {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <main>
        <script>
// Calming blue particles flowing like water
let particles = [];
let numParticles = 800;
let flowField = [];
let cols, rows;
let resolution = 15;
let zoff = 0;

function setup() {
  createCanvas(800, 600);
  pixelDensity(1);

  cols = floor(width / resolution);
  rows = floor(height / resolution);

  // Initialize particles
  for (let i = 0; i < numParticles; i++) {
    particles.push({
      x: random(width),
      y: random(height),
      vx: 0,
      vy: 0,
      size: random(2, 4),
      alpha: random(100, 200)
    });
  }
}

function draw() {
  // Dark blue background with slight transparency for trails
  background(5, 10, 25, 50);

  zoff += 0.003;

  // Calculate flow field using Perlin noise
  let yoff = 0;
  for (let y = 0; y < rows; y++) {
    let xoff = 0;
    for (let x = 0; x < cols; x++) {
      let index = x + y * cols;
      let angle = noise(xoff, yoff, zoff) * TWO_PI * 2;
      let v = p5.Vector.fromAngle(angle);
      v.setMag(1);
      flowField[index] = v;
      xoff += 0.1;
    }
    yoff += 0.1;
  }

  // Update and draw particles
  noStroke();
  for (let p of particles) {
    // Follow flow field
    let x = floor(p.x / resolution);
    let y = floor(p.y / resolution);
    x = constrain(x, 0, cols - 1);
    y = constrain(y, 0, rows - 1);
    let index = x + y * cols;
    let force = flowField[index];

    if (force) {
      p.vx += force.x * 0.2;
      p.vy += force.y * 0.2;
    }

    // Limit velocity
    p.vx = constrain(p.vx, -2, 2);
    p.vy = constrain(p.vy, -2, 2);

    // Update position
    p.x += p.vx;
    p.y += p.vy;

    // Wrap around edges
    if (p.x > width) p.x = 0;
    if (p.x < 0) p.x = width;
    if (p.y > height) p.y = 0;
    if (p.y < 0) p.y = height;

    // Draw particle with blue color
    let speed = sqrt(p.vx * p.vx + p.vy * p.vy);
    let blueVal = map(speed, 0, 2, 150, 255);
    fill(50, 150, blueVal, p.alpha);
    ellipse(p.x, p.y, p.size);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  cols = floor(width / resolution);
  rows = floor(height / resolution);
}

function mousePressed() {
  // Reset particles on click
  for (let p of particles) {
    p.x = random(width);
    p.y = random(height);
    p.vx = 0;
    p.vy = 0;
  }
}
        </script>
    </main>
</body>
</html>
