<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Liminal Harness Lifecycle - Dogfood Test</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.10/p5.min.js"></script>
  <style>body{margin:0;padding:20px;background:#1a1a2e;color:#fff;font-family:sans-serif;}</style>
</head>
<body>
  <h1>🎨 Dogfood Test: Harness Visualizing Itself</h1>
  <p>This sketch was generated by Liminal to visualize its own task lifecycle.</p>
  <script>
let tasks = [];
const TASK_COUNT = 6;
const GUARDRAILS = ["M1", "M2", "M3", "M4", "M5", "M6", "M7", "M8", "M9", "M10", "M11"];
const COLORS = {
  pending: { fill: '#FFD7C0', stroke: '#FF8B7A' },
  in_progress: { fill: '#FFF5C4', stroke: '#FCC9E6' },
  completed: { fill: '#B3E8FC', stroke: '#4DB9F1' },
  failed: { fill: '#FFC3C3', stroke: '#FF7070' }
};

class Task {
  constructor(id, x, y) {
    this.id = id;
    this.x = x;
    this.y = y;
    this.state = 'pending';
    this.progress = 0;
    this.speed = random(0.5, 1.2);
    this.guardrailIndex = 0;
    this.direction = 1; // 1 for forward, -1 for backward (retry)
    this.completedCount = 0;
    this.failedCount = 0;
  }

  update() {
    if (this.state === 'pending') {
      this.progress += 0.5 * this.speed;
      if (this.progress >= 20) {
        this.state = 'in_progress';
        this.progress = 0;
        this.guardrailIndex = 0;
      }
    } else if (this.state === 'in_progress') {
      this.progress += 1 * this.speed;
      if (this.progress >= 30) {
        this.guardrailIndex += this.direction;
        
        // Check guardrail completion
        if (this.guardrailIndex >= GUARDRAILS.length) {
          this.completedCount++;
          
          // Determine next state based on recursion loop logic
          const shouldRetry = random() < 0.6; // 60% chance to continue improving
          
          if (shouldRetry && this.completedCount < 3) { // Max 3 iterations
            this.state = 'pending';
            this.progress = 0;
            this.direction = -1; // Go back for improvement
            this.guardrailIndex--;
          } else {
            this.state = 'completed';
          }
        } else if (this.guardrailIndex < 0) {
          // Return to first guardrail
          this.guardrailIndex = 0;
          this.direction = 1;
          
          // Check if failed (random failure simulation)
          if (random() < 0.2) { // 20% chance of failure
            this.state = 'failed';
          }
        } else {
          this.progress = 0;
        }
      }
    }
    
    return this.state === 'completed' || this.state === 'failed';
  }

  draw() {
    const colorScheme = COLORS[this.state];
    
    // Draw task circle with state-based styling
    noStroke();
    fill(colorScheme.fill);
    stroke(colorScheme.stroke);
    strokeWeight(3);
    circle(this.x, this.y, 40);
    
    // Draw progress indicator for in_progress state
    if (this.state === 'in_progress') {
      const angle = map(this.progress, 0, 30, 0, TWO_PI);
      noStroke();
      fill(colorScheme.stroke, 150);
      arc(this.x, this.y, 48, 48, -PI/2, -PI/2 + angle);
    }
    
    // Draw task ID with color
    fill(this.state === 'pending' ? '#FF6A76' : (this.state === 'in_progress' ? '#FCC9E6' : (this.state === 'completed' ? '#4DB9F1' : '#FF5D5D')));
    textAlign(CENTER, CENTER);
    textSize(12);
    text(`Task ${this.id}`, this.x, this.y + 4);
    
    // Draw current guardrail checkpoint
    if (this.state === 'in_progress') {
      noStroke();
      fill('#FFFFFF');
      stroke('#000000', 50);
      strokeWeight(1);
      circle(this.x + map(this.guardrailIndex, 0, GUARDRAILS.length - 1, -60, 60), this.y + 25, 14);
      
      fill('#FFFFFF');
      textSize(9);
      text(GUARDRAILS[this.guardrailIndex], this.x + map(this.guardrailIndex, 0, GUARDRAILS.length - 1, -60, 60), this.y + 25);
    }
    
    // Draw state label
    fill('#FFFFFF');
    textSize(10);
    text(this.state.toUpperCase().replace('_', ' '), this.x, this.y + 45);
  }

  reset() {
    this.state = 'pending';
    this.progress = 0;
    this.guardrailIndex = 0;
    this.direction = 1;
    this.completedCount = 0;
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  
  // Initialize tasks
  const spacingX = width / (TASK_COUNT + 1);
  for (let i = 0; i < TASK_COUNT; i++) {
    tasks.push(new Task(i + 1, spacingX * (i + 1), height / 2));
  }
}

function draw() {
  background(30, 30, 50);
  
  // Draw background gradient
  noStroke();
  for (let y = 0; y < height; y++) {
    const intensity = map(y, 0, height, 40, 30);
    fill(intensity, intensity, intensity + 20);
    rect(0, y, width, 1);
  }
  
  // Draw title
  fill('#FFFFFF');
  textAlign(CENTER, CENTER);
  textSize(24);
  text('Liminal Harness Task Lifecycle', width / 2, 50);
  textSize(14);
  fill('#CCCCCC');
  text('Tasks flow through states: PENDING → IN_PROGRESS → COMPLETED/FAILED', width / 2, 80);
  
  // Draw guardrail checkpoints
  const guardrailSpacing = width * 0.9 / (GUARDRAILS.length - 1);
  const startX = width * 0.05;
  const startY = height / 2 + 40;
  
  noStroke();
  for (let i = 0; i < GUARDRAILS.length; i++) {
    const x = startX + i * guardrailSpacing;
    
    // Draw guardrail line
    stroke('#FFFFFF', 30);
    strokeWeight(1);
    line(x, startY - 20, x, startY + 60);
    
    // Draw guardrail circle
    fill(i < tasks[0].guardrailIndex ? '#4DB9F1' : (i === tasks[0].guardrailIndex ? '#FFF5C4' : '#FFFFFF'), 30);
    if (i === 0) {
      fill('#FFF5C4', 50);
    } else if (i > 0 && i < GUARDRAILS.length - 1) {
      fill('#FFFFFF', 20);
    }
    
    circle(x, startY + 30, 24);
    
    // Draw guardrail label
    fill(i === tasks[0].guardrailIndex ? '#FFF5C4' : '#FFFFFF');
    textSize(9);
    text(GUARDRAILS[i], x, startY + 30);
    
    // Draw state indicators for this guardrail
    let completedCount = 0;
    let inProgressCount = 0;
    let failedCount = 0;
    
    tasks.forEach(task => {
      if (task.guardrailIndex === i) {
        if (task.state === 'completed') completedCount++;
        else if (task.state === 'in_progress') inProgressCount++;
        else if (task.state === 'failed') failedCount++;
      }
    });
    
    // Draw small indicators for each task at this guardrail
    const indicatorY = startY + 50;
    let indicatorX = x - 15;
    for (let k = 0; k < completedCount; k++) {
      fill('#4DB9F1');
      circle(indicatorX, indicatorY, 8);
      indicatorX += 12;
    }
    for (let k = 0; k < inProgressCount; k++) {
      fill('#FFF5C4');
      circle(indicatorX, indicatorY, 8);
      indicatorX += 12;
    }
    for (let k = 0; k < failedCount; k++) {
      fill('#FF7070');
      circle(indicatorX, indicatorY, 8);
      indicatorX += 12;
    }
    
    // Draw state legend at bottom
    if (i === GUARDRAILS.length - 1) {
      const legendText = [
        'PENDING → IN_PROGRESS → COMPLETED',
        'Each task passes through guardrails M1-M11',
        'Green: Completed, Yellow: In Progress, Red: Failed'
      ];
      
      fill('#FFFFFF');
      textSize(12);
      text(legendText[0], width / 2, height - 50);
      text(legendText[1], width / 2, height - 35);
      text(legendText[2], width / 2, height - 20);
    }
  }
  
  // Draw task animations
  let allCompleted = true;
  for (const task of tasks) {
    const isDone = task.update();
    task.draw();
    
    if (!isDone) {
      allCompleted = false;
    }
  }
  
  // Reset tasks when all are complete to restart animation
  if (allCompleted && frameCount % 30 === 0) {
    for (const task of tasks) {
      task.reset();
    }
  }
}
  </script>
</body>
</html>
