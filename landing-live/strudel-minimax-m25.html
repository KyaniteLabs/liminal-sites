<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://unpkg.com/@strudel/repl@latest"></script>
  <style>body { margin: 0; background: #1a1a2e; color: #fff; font-family: monospace; padding: 20px; }</style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { repl } from 'https://unpkg.com/@strudel/repl@latest';
    const code = `sound("bd*4") |> gain(1.2) |> shape(0.3),
  sound("sd*2") |> struct("t(2,4)") |> gain(0.8) |> shape(0.4),
  sound("hh") |> fast(2) |> struct("t(0,2)") |> gain(0.5) |> room(0.3),
  sound("bass:0") |> struct("[0 1 2 3]*4") |> speed("1 2 1.5 2") |> shape(0.6) |> delay(0.25) |> gain(0.7)
) |> room(0.4) |> gain(0.9)`;
    document.getElementById('app').innerHTML = '<pre>' + code + '</pre><p>Click to play (audio)</p>';
  </script>
</body>
</html>
