<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://unpkg.com/@strudel/repl@latest"></script>
  <style>body { margin: 0; background: #1a1a2e; color: #fff; font-family: monospace; padding: 20px; }</style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { repl } from 'https://unpkg.com/@strudel/repl@latest';
    const code = `stack(
  s("kick", every(4, n(0, 0.2, 0.1))),
  s("snare", sometimes(n(1, 0.1), every(2, n(1, 0.15)))),
  s("hihat", every(1, n(3, 0.08, 0.05))),
  s("bassline", fast(rev(slow(stack(
    n(4, 0.3),
    n(6, 0.25),
    n(7, 0.2),
    n(5, 0.25)
  )))))
).effects(
  gain(0.8),
  room(0.3),
  delay(0.1, 0.4, 0.3)
)`;
    document.getElementById('app').innerHTML = '<pre>' + code + '</pre><p>Click to play (audio)</p>';
  </script>
</body>
</html>
