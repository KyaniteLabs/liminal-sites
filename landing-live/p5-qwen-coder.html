<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>body { margin: 0; overflow: hidden; background: #000; }</style>
</head>
<body>
  <script>let fireworks = [];
const GRAVITY = 0.1;

class Particle {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.vx = random(-5, 5);
    this.vy = random(-5, 5);
    this.alpha = 255;
    this.color = color;
  }

  update() {
    this.vx *= 0.98; // air resistance
    this.vy *= 0.98;
    this.vy += GRAVITY; // gravity effect
    
    this.x += this.vx;
    this.y += this.vy;
    this.alpha -= random(3, 7); // fade out speed
  }

  show() {
    push();
    noStroke();
    fill(red(this.color), green(this.color), blue(this.color), this.alpha);
    ellipse(this.x, this.y, 4, 4);
    pop();
  }
}

class Firework {
  constructor(x, y) {
    this.exploded = false;
    this.particles = [];
    const numParticles = random(80, 120);
    const hue = random(0, 360);
    
    for (let i = 0; i < numParticles; i++) {
      let color = color(hue + random(-30, 30), random(70, 100), random(80, 100));
      this.particles.push(new Particle(x, y, color));
    }
  }

  update() {
    for (let i = this.particles.length - 1; i >= 0; i--) {
      let p = this.particles[i];
      p.update();
      
      if (p.alpha <= 5) {
        this.particles.splice(i, 1);
      }
    }
    
    return this.particles.length > 0;
  }

  show() {
    for (let p of this.particles) {
      p.show();
    }
  }
}

function setup() {
  createCanvas(windowWidth, windowHeight);
  pixelDensity(1);
  background(10);
  randomSeed(millis());
}

function draw() {
  // Create fading trails
  push();
  fill(10, 30); // low alpha creates longer trails
  noStroke();
  rect(0, 0, width, height);
  pop();
  
  // Add new fireworks periodically
  if (random() < 0.05) {
    let x = random(width * 0.2, width * 0.8);
    let y = random(height * 0.1, height * 0.6);
    fireworks.push(new Firework(x, y));
  }
  
  // Update and show fireworks
  for (let i = fireworks.length - 1; i >= 0; i--) {
    if (!fireworks[i].update()) {
      fireworks.splice(i, 1);
    } else {
      fireworks[i].show();
    }
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}</script>
</body>
</html>
