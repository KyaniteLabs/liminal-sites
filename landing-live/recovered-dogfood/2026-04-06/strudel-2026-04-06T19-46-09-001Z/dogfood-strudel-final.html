<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline'; connect-src 'none'; img-src 'self' data: blob:; media-src 'self';">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <title>Strudel Pattern</title>
    <script src="https://unpkg.com/@strudel/repl@latest"></script>
    <style>
        body { 
            margin: 0; 
            background: #1a1a2e; 
            color: #fff; 
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace; 
            padding: 20px;
            min-height: 100vh;
        }
        #code-display {
            background: #0a0a0f;
            padding: 16px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
            overflow-x: auto;
            white-space: pre;
            color: #a5b4fc;
            border: 1px solid #312e81;
        }
        .keyword { color: #c084fc; }
        .string { color: #86efac; }
        .function { color: #60a5fa; }
        .number { color: #fbbf24; }
        #status {
            margin-top: 12px;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            display: inline-block;
        }
        #status.ready { background: #1e3a5f; color: #60a5fa; }
        #status.playing { background: #064e3b; color: #34d399; }
        #status.error { background: #450a0a; color: #f87171; }
        .controls { margin-top: 16px; }
    </style>
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com cdn.jsdelivr.net unpkg.com; style-src 'unsafe-inline'; img-src 'self' blob:; connect-src 'none'; font-src 'self';">
</head>
<body>
    <div style="max-width: 800px; margin: 0 auto;">
        <h3 style="color: #ec4899; margin-bottom: 16px;">🎵 Strudel Live Coding Pattern</h3>
        <div id="code-display"></div>
        <div id="status" class="ready">Ready to play</div>
        <div class="controls">
            <button id="playBtn" style="padding: 12px 24px; font-size: 16px; background: #ec4899; color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px;">▶ Play Pattern</button>
        </div>
    </div>
    <script type="module">
        import { repl, controls } from 'https://unpkg.com/@strudel/repl@latest';
        
        const code = `// set up sample maps if needed
// patterns
p("drums", s("bd:1 sd:2"))`;
        
        const highlighted = code
            .replace(/(stack|s|note|sound|cpm|fast|slow|gain|pan|room|delay|cutoff|resonance)/g, '<span class="keyword">$1</span>')
            .replace(/("[^"]*"|'[^']*')/g, '<span class="string">$1</span>')
            .replace(new RegExp('\b(\d+\.?\d*)\b', 'g'), '<span class="number">$1</span>')
            .replace(new RegExp('(\w+)\s*\(', 'g'), '<span class="function">$1</span>(');
        
        document.getElementById('code-display').innerHTML = highlighted;
        
        const statusEl = document.getElementById('status');
        const playBtn = document.getElementById('playBtn');
        let isPlaying = false;
        
        async function initStrudel() {
            try {
                const app = await repl({
                    code: code,
                    onError: (err) => {
                        Logger.error('GenericWrapper', 'Strudel error:', err);
                        statusEl.className = 'error';
                        statusEl.textContent = 'Error: ' + err.message;
                    }
                });
                return app;
            } catch (err) {
                Logger.error('GenericWrapper', 'Failed to init Strudel:', err);
                statusEl.className = 'error';
                statusEl.textContent = 'Failed to initialize';
                return null;
            }
        }
        
        let strudelApp = null;
        
        async function startPlayback() {
            if (!strudelApp) {
                strudelApp = await initStrudel();
            }
            if (strudelApp) {
                await controls.start();
                isPlaying = true;
                statusEl.className = 'playing';
                statusEl.textContent = '🔊 Playing (click to stop)';
                playBtn.textContent = '⏹ Stop';
            }
        }
        
        async function stopPlayback() {
            await controls.stop();
            isPlaying = false;
            statusEl.className = 'ready';
            statusEl.textContent = 'Ready to play';
            playBtn.textContent = '▶ Play Pattern';
        }
        
        if (playBtn) {
            playBtn.addEventListener('click', () => {
                if (isPlaying) {
                    stopPlayback();
                } else {
                    startPlayback();
                }
            });
        }
        
        
        
        statusEl.style.cursor = 'pointer';
        statusEl.addEventListener('click', () => {
            if (isPlaying) {
                stopPlayback();
            } else {
                startPlayback();
            }
        });
    </script>
</body>
</html>
