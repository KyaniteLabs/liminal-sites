<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://unpkg.com; style-src 'self' 'unsafe-inline'; connect-src 'none'; img-src 'self' data: blob:; media-src 'self';">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <title>Generated Output</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; }
        main { box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
    </style>
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com cdn.jsdelivr.net unpkg.com; style-src 'unsafe-inline'; img-src 'self' blob:; connect-src 'none'; font-src 'self';">
</head>
<body>
    <main>
        <script>
let particles = [];
const NUM_PARTICLES = 100;
const BLUE_HUE = 200; // A calming blue hue

class Particle {
  constructor(x, y) {
    this.pos = createVector(x, y);
    // Initial velocity simulating gentle flow
    this.vel = p5.Vector.random2D().mult(random(0.1, 1.5));
    this.acc = createVector(0, 0);
    this.lifespan = 255;
    this.radius = random(1, 3);
  }

  applyForce(force) {
    this.acc.add(force);
  }

  update() {
    this.vel.add(this.acc);
    this.pos.add(this.vel);
    this.acc.mult(0); // Reset acceleration

    this.lifespan -= 1.5;
  }

  display() {
    // Color based on blue hue, fading out
    stroke(BLUE_HUE, 100, 255, this.lifespan);
    strokeWeight(this.radius);
    point(this.pos.x, this.pos.y);
  }
}

function setup() {
  createCanvas(800, 600);
  background(20, 20, 40); // Dark, deep blue background
}

function draw() {
  // Create a faint, semi-transparent background overlay to create the "flow" trail effect
  background(20, 20, 40, 50);

  // 1. Update and Display Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.update();
    p.display();

    // Remove dead particles
    if (p.lifespan < 0) {
      particles.splice(i, 1);
    }
  }

  // 2. Gentle attraction/flow force (Simulating a subtle current)
  let flowForce = createVector(0, 0.1); // Slight downward drift
  let center = createVector(width / 2, height / 2);
  
  // Apply a slight attraction towards the center, simulating a vortex or gentle current
  for (let p of particles) {
    let attraction = p5.Vector.sub(center, p.pos);
    attraction.normalize();
    attraction.mult(0.005); // Very weak pull
    
    p.applyForce(flowForce);
    p.applyForce(attraction);
  }

  // 3. Spawn new particles periodically to keep the system active
  if (random(1) < 0.15) {
    let x = random(width);
    let y = random(height);
    particles.push(new Particle(x, y));
  }
}

// Optional: Add a slight burst on mouse interaction for user control
function mouseMoved() {
    // When the mouse moves, spawn a small burst of particles near it
    for (let i = 0; i < 3; i++) {
        particles.push(new Particle(mouseX, mouseY));
    }
}
        </script>
    </main>
</body>
</html>
