<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.10/p5.min.js"></script>
  <style>body { margin: 0; overflow: hidden; background: #000; }</style>
</head>
<body>
  <script>let fireworks = [];
let gravity;
let windNoiseOffset = 0;

function setup() {
  createCanvas(800, 600);
  pixelDensity(1);
  colorMode(HSB, 360, 100, 100, 100);
  noiseSeed(millis());
  gravity = createVector(0, 0.2);
}

function draw() {
  background(220, 80, 5, 15);
  
  if (random(1) < 0.03) {
    fireworks.push(new Firework());
  }
  
  let windX = map(noise(windNoiseOffset), 0, 1, -0.03, 0.03);
  let wind = createVector(windX, 0);
  windNoiseOffset += 0.02;
  
  for (let i = fireworks.length - 1; i >= 0; i--) {
    fireworks[i].applyForce(wind);
    fireworks[i].update();
    fireworks[i].show();
    if (fireworks[i].done()) {
      fireworks.splice(i, 1);
    }
  }
}

function windowResized() {
  resizeCanvas(800, 600);
}

class Firework {
  constructor() {
    this.hu = random(360);
    this.firework = new Particle(random(width), height, this.hu, true);
    this.exploded = false;
    this.particles = [];
  }
  
  applyForce(force) {
    if (!this.exploded) {
      this.firework.applyForce(force);
    }
    for (let p of this.particles) {
      p.applyForce(force);
    }
  }
  
  update() {
    if (!this.exploded) {
      this.firework.applyForce(gravity);
      this.firework.update();
      if (this.firework.vel.y >= 0) {
        this.explode();
      }
    }
    
    for (let i = this.particles.length - 1; i >= 0; i--) {
      this.particles[i].applyForce(gravity);
      this.particles[i].update();
      if (this.particles[i].done()) {
        this.particles.splice(i, 1);
      }
    }
  }
  
  explode() {
    this.exploded = true;
    let count = int(random(60, 100));
    for (let i = 0; i < count; i++) {
      let p = new Particle(this.firework.pos.x, this.firework.pos.y, this.hu, false);
      this.particles.push(p);
    }
  }
  
  show() {
    if (!this.exploded) {
      this.firework.show();
    }
    for (let p of this.particles) {
      p.show();
    }
  }
  
  done() {
    return this.exploded && this.particles.length === 0;
  }
}

class Particle {
  constructor(x, y, hu, isFirework) {
    this.pos = createVector(x, y);
    this.isFirework = isFirework;

    this.hu = hu;

</body>
</html>
