<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.10/p5.min.js"></script>
  <style>body { margin: 0; overflow: hidden; background: #000; }</style>
</head>
<body>
  <script>let fireworks = [];

function setup() {
  createCanvas(800, 600);
  pixelDensity(1);
}

function draw() {
  background(10, 10, 25, 40);
  
  if (random(1) < 0.025) {
    fireworks.push(new Firework(random(100, width - 100), height));
  }
  
  for (let i = fireworks.length - 1; i >= 0; i--) {
    fireworks[i].update();
    fireworks[i].display();
    if (fireworks[i].isFinished()) {
      fireworks.splice(i, 1);
    }
  }
}

class Firework {
  constructor(x, targetY) {
    this.origin = createVector(x, height);
    this.target = createVector(x, targetY);
    this.pos = this.origin.copy();
    this.vel = createVector(0, -random(12, 18));
    this.acc = createVector(0, 0);
    this.launched = true;
    this.exploded = false;
    this.particles = [];
    this.color = this.generateColor();
    this.trail = [];
  }
  
  generateColor() {
    let palette = [
      color(255, 50, 50),
      color(50, 255, 50),
      color(50, 50, 255),
      color(255, 255, 50),
      color(255, 50, 255),
      color(50, 255, 255),
      color(255, 150, 50),
      color(255, 255, 255)
    ];
    return random(palette);
  }
  
  update() {
    if (!this.exploded) {
      this.vel.add(this.acc);
      this.pos.add(this.vel);
      this.acc.set(0, 0.2);
      
      this.trail.push({x: this.pos.x, y: this.pos.y, alpha: 255});
      if (this.trail.length > 20) this.trail.shift();
      
      if (this.pos.y <= this.target.y) {
        this.explode();
      }
    } else {
      for (let p of this.particles) {
        p.update();
      }
    }
  }
  
  explode() {
    this.exploded = true;
    let particleCount = floor(random(80, 150));
    for (let i = 0; i < particleCount; i++) {
      this.particles.push(new Particle(this.pos.x, this.pos.y, this.color));
    }
  }
  
  display() {
    if (!this.exploded) {
      for (let i = 0; i < this.trail.length; i++) {
        let t = this.trail[i];
        let alpha = map(i, 0, this.trail.length, 50, 255);
        stroke(this.color);
        strokeWeight(3);
        point(t.x, t.y);
      }
      stroke(255, 200);
      strokeWeight(4);
      point(this.pos.x, this.pos.y);
    } else {
      for (let p of this.particles) {
        p.display();
      }
    }
  }
  
  isFinished() {
    if (!this.exploded) return false;
    for (let p of this.particles) {
      if (p.life > 0) return false;
    }
    return true;
  }
}

class Particle {
  constructor(x, y, col) {
    this.pos = createVector(x, y);
    let angle = random(TWO_PI);
    let magnitude = random(2, 7);
    this.vel = createVector(cos(angle) * magnitude, sin(angle) * magnitude);
    this.color = col;
    this.life = 255;
    this.decay = random(1.5, 4);
    this.gravity = createVector(0, 0.12);
    this.size = random(2, 5);
  }
  
  update() {
    this.vel.add(this.gravity);
    this.pos.add(this.vel);
    this.life -= this.decay;
  }
  
  display() {
    noStroke();
    let r = red(this.color);
    let g = green(this.color);
    let b = blue(this.color);
    fill(r, g, b, this.life);
    ellipse(this.pos.x, this.pos.y, this.size);
  }
}</script>
</body>
</html>
