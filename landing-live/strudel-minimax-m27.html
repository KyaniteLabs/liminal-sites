<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://unpkg.com/@strudel/repl@latest"></script>
  <style>body { margin: 0; background: #1a1a2e; color: #fff; font-family: monospace; padding: 20px; }</style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { repl } from 'https://unpkg.com/@strudel/repl@latest';
    const code = `stack(
  s("bd:1").gain(1.3).speed("1 2 1 2"),
  s("sd:3").gain(0.8).pan("0.3 -0.3").every(2, "fast 2"),
  s("hh:2").gain(0.4).fast(2).every(3, "rev"),
  s("sawtooth").n("0 0 7 5 3 0 5 7").gain(0.6).room(0.3).delay(0.4).delaytime(0.25)
).fast(2)`;
    document.getElementById('app').innerHTML = '<pre>' + code + '</pre><p>Click to play (audio)</p>';
  </script>
</body>
</html>
