<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>body { margin: 0; overflow: hidden; background: #000; }</style>
</head>
<body>
  <script><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe Torus Knot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0a0f; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, 0.02);

        // Camera
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 8);

        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // Orbit Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 3;
        controls.maxDistance = 20;

        // Torus Knot Geometry
        const torusKnotGeometry = new THREE.TorusKnotGeometry(1.5, 0.4, 128, 32, 2, 3);

        // Wireframe Material with color animation
        const torusKnotMaterial = new THREE.MeshStandardMaterial({
            color: 0xff00ff,
            wireframe: true,
            emissive: 0xff00ff,
            emissiveIntensity: 0.3,
            metalness: 0.8,
            roughness: 0.2
        });

        const torusKnot = new THREE.Mesh(torusKnotGeometry, torusKnotMaterial);
        scene.add(torusKnot);

        // Inner glow mesh
        const innerMaterial = new THREE.MeshBasicMaterial({
            color: 0x220033,
            transparent: true,
            opacity: 0.1,
            side: THREE.DoubleSide
        });
        const innerKnot = new THREE.Mesh(torusKnotGeometry.clone(), innerMaterial);
        innerKnot.scale.setScalar(0.85);
        scene.add(innerKnot);

        // Animated lights
        const lights = [];
        const lightColors = [0xff00ff, 0x00ffff, 0xff6600, 0x00ff88];
        const lightPositions = [
            { x: 5, y: 3, z: 5 },
            { x: -5, y: -3, z: 5 },
            { x: 5, y: -3, z: -5 },
            { x: -5, y: 3, z: -5 }
        ];

        lightPositions.forEach((pos, i) => {
            const light = new THREE.PointLight(lightColors[i], 3, 20);
            light.position.set(pos.x, pos.y, pos.z);
            light.userData = {
                originalPos: { ...pos },
                angle: (Math.PI * 2 / lightPositions.length) * i,
                speed: 0.3 + Math.random() * 0.2
            };
            lights.push(light);
            scene.add(light);
        });

        // Ambient light
        const ambientLight = new THREE.AmbientLight(0x111122, 0.5);
        scene.add(ambientLight);

        // Post-processing
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            0.8,
            0.4,
            0.85
        );
        composer.addPass(bloomPass);

        // Particle system background
        const particlesGeometry = new THREE.BufferGeometry();
        const particleCount = 500;
        const positions = new Float32Array(particleCount * 3);
        
        for (let i = 0; i < particleCount * 3; i += 3) {
            positions[i] = (Math.random() - 0.5) * 30;
            positions[i + 1] = (Math.random() - 0.5) * 30;
            positions[i + 2] = (Math.random() - 0.5) * 30;
        }
        
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particlesMaterial = new THREE.PointsMaterial({
            color: 0x6644ff,
            size: 0.05,
            transparent: true,
            opacity: 0.6,
            sizeAttenuation: true
        });
        const particles = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particles);

        // Animation
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const elapsed = clock.getElapsedTime();

            // Rotate torus knot
            torusKnot.rotation.x = elapsed * 0.3;
            torusKnot.rotation.y = elapsed * 0.5;
            innerKnot.rotation.x = elapsed * 0.3;
            innerKnot.rotation.y = elapsed * 0.5;

            // Color shifting
            const hue = (elapsed * 0.1) % 1;
            const color = new THREE.Color().setHSL(hue, 1, 0.5);
            torusKnotMaterial.color.copy(color);
            torusKnotMaterial.emissive.copy(color);

            // Animate lights
            lights.forEach((light, i) => {
                const userData = light.userData;
                const radius = 6;
                light.position.x = Math.cos(elapsed * userData.speed + userData.angle) * radius;
                light.position.y = Math.sin(elapsed * userData.speed * 0.7 + userData.angle) * 3;
                light.position.z = Math.sin(elapsed * userData.speed + userData.angle) * radius;
                
                // Pulse intensity
                light.intensity = 2 + Math.sin(elapsed * 2 + i) * 1;
            });

            // Rotate particles slowly
            particles.rotation.y = elapsed * 0.05;
            particles.rotation.x = elapsed * 0.02;

            controls.update();
            composer.render();
        }

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html></script>
</body>
</html>
