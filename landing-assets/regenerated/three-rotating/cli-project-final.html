<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Geometric Shapes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-family: 'Segoe UI', sans-serif;
            font-size: 14px;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">Drag to rotate • Scroll to zoom</div>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        let scene, camera, renderer, controls, composer;
        let shapes = [];
        let lights = [];
        let clock = new THREE.Clock();

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a12);
            scene.fog = new THREE.Fog(0x0a0a12, 8, 25);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 2, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 5;
            controls.maxDistance = 20;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;

            const ambientLight = new THREE.AmbientLight(0x222233, 0.5);
            scene.add(ambientLight);

            const pointLight1 = new THREE.PointLight(0xff6b6b, 2, 20);
            pointLight1.position.set(5, 5, 5);
            scene.add(pointLight1);
            lights.push({ light: pointLight1, color: new THREE.Color(0xff6b6b), baseIntensity: 2 });

            const pointLight2 = new THREE.PointLight(0x4ecdc4, 2, 20);
            pointLight2.position.set(-5, 3, -5);
            scene.add(pointLight2);
            lights.push({ light: pointLight2, color: new THREE.Color(0x4ecdc4), baseIntensity: 2 });

            const pointLight3 = new THREE.PointLight(0xf7d794, 2, 20);
            pointLight3.position.set(0, -5, 5);
            scene.add(pointLight3);
            lights.push({ light: pointLight3, color: new THREE.Color(0xf7d794), baseIntensity: 2 });

            createShapes();

            composer = new EffectComposer(renderer);
            const renderPass = new RenderPass(scene, camera);
            composer.addPass(renderPass);

            const bloomPass = new UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                0.8,
                0.4,
                0.85
            );
            composer.addPass(bloomPass);

            window.addEventListener('resize', onWindowResize);
        }

        function createShapes() {
            const materials = [
                new THREE.MeshStandardMaterial({ color: 0xff6b6b, metalness: 0.7, roughness: 0.2 }),
                new THREE.MeshStandardMaterial({ color: 0x4ecdc4, metalness: 0.8, roughness: 0.1 }),
                new THREE.MeshStandardMaterial({ color: 0xf7d794, metalness: 0.6, roughness: 0.3 }),
                new THREE.MeshPhysicalMaterial({ color: 0xc44dff, metalness: 0.9, roughness: 0.1, clearcoat: 1 }),
                new THREE.MeshStandardMaterial({ color: 0x5cd85c, metalness: 0.5, roughness: 0.4 }),
                new THREE.MeshPhysicalMaterial({ color: 0x4a90d9, metalness: 0.7, roughness: 0.2, clearcoat: 0.5 })
            ];

            const torusGeometry = new THREE.TorusGeometry(1.2, 0.4, 16, 50);
            const torus = new THREE.Mesh(torusGeometry, materials[0]);
            torus.position.set(3, 1.5, 0);
            scene.add(torus);
            shapes.push({ mesh: torus, rotationSpeed: { x: 0.008, y: 0.012, z: 0.005 }, floatSpeed: 0.8, floatOffset: 0 });

            const icosaGeometry = new THREE.IcosahedronGeometry(1, 0);
            const icosahedron = new THREE.Mesh(icosaGeometry, materials[1]);
            icosahedron.position.set(-3, 2, 1);
            scene.add(icosahedron);
            shapes.push({ mesh: icosahedron, rotationSpeed: { x: 0.01, y: 0.015, z: 0.008 }, floatSpeed: 1.2, floatOffset: 1 });

            const octaGeometry = new THREE.OctahedronGeometry(1.1, 0);
            const octahedron = new THREE.Mesh(octaGeometry, materials[2]);
            octahedron.position.set(0, -1, 2);
            scene.add(octahedron);
            shapes.push({ mesh: octahedron, rotationSpeed: { x: 0.012, y: 0.008, z: 0.01 }, floatSpeed: 1.0, floatOffset: 2 });

            const dodecaGeometry = new THREE.DodecahedronGeometry(0.9, 0);
            const dodecahedron = new THREE.Mesh(dodecaGeometry, materials[3]);
            dodecahedron.position.set(-2, -1.5, -2);
            scene.add(dodecahedron);
            shapes.push({ mesh: dodecahedron, rotationSpeed: { x: 0.006, y: 0.01, z: 0.012 }, floatSpeed: 0.9, floatOffset: 3 });

            const coneGeometry = new THREE.ConeGeometry(0.8, 1.6, 6);
            const cone = new THREE.Mesh(coneGeometry, materials[4]);
            cone.position.set(2, -2, -1);
            scene.add(cone);
            shapes.push({ mesh: cone, rotationSpeed: { x: 0.015, y: 0.006, z: 0.009 }, floatSpeed: 1.1, floatOffset: 4 });

            const torusKnotGeometry = new THREE.TorusKnotGeometry(0.7, 0.25, 100, 16);
            const torusKnot = new THREE.Mesh(torusKnotGeometry, materials[5]);
            torusKnot.position.set(-1.5, 0.5, -1);
            scene.add(torusKnot);
            shapes.push({ mesh: torusKnot, rotationSpeed: { x: 0.007, y: 0.011, z: 0.006 }, floatSpeed: 0.7, floatOffset: 5 });

            const sphereGeometry = new THREE.SphereGeometry(0.6, 32, 32);
            for (let i = 0; i < 8; i++) {
                const sphereMaterial = new THREE.MeshPhysicalMaterial({
                    color: new THREE.Color().setHSL(i * 0.125, 0.7, 0.5),
                    metalness: 0.9,
                    roughness: 0.1,
                    clearcoat: 0.8
                });
                const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
                const angle = (i / 8) * Math.PI * 2;
                const radius = 4.5;
                sphere.position.set(
                    Math.cos(angle) * radius,
                    Math.sin(angle * 2) * 1.5,
                    Math.sin(angle) * radius
                );
                scene.add(sphere);
                shapes.push({
                    mesh: sphere,
                    rotationSpeed: { x: 0.02, y: 0.02, z: 0 },
                    floatSpeed: 1.5 + Math.random() * 0.5,
                    floatOffset: i * 0.8,
                    orbit: { angle: angle, radius: radius, speed: 0.1 + Math.random() * 0.1 }
                });
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            const delta = clock.getDelta();

            shapes.forEach((shape, index) => {
                shape.mesh.rotation.x += shape.rotationSpeed.x;
                shape.mesh.rotation.y += shape.rotationSpeed.y;
                shape.mesh.rotation.z += shape.rotationSpeed.z;

                if (shape.floatOffset !== undefined) {
                    shape.mesh.position.y += Math.sin(time * shape.floatSpeed + shape.floatOffset) * 0.003;
                }

                if (shape.orbit) {
                    shape.orbit.angle += shape.orbit.speed * 0.01;
                    shape.mesh.position.x = Math.cos(shape.orbit.angle) * shape.orbit.radius;
                    shape.mesh.position.z = Math.sin(shape.orbit.angle) * shape.orbit.radius;
                    shape.mesh.position.y += Math.sin(time * shape.floatSpeed + shape.floatOffset) * 0.01;
                }
            });

            lights.forEach((lightData, index) => {
                const pulse = Math.sin(time * 0.5 + index * 2) * 0.5 + 0.5;
                lightData.light.intensity = lightData.baseIntensity * (0.7 + pulse * 0.6);

                const hue = (time * 0.05 + index * 0.33) % 1;
                const color = new THREE.Color().setHSL(hue, 0.8, 0.5);
                lightData.light.color = color;

                lightData.light.position.x += Math.sin(time * 0.3 + index) * 0.01;
                lightData.light.position.z += Math.cos(time * 0.3 + index) * 0.01;
            });

            controls.update();
            composer.render();
        }
    </script>
</body>
</html>
