<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Dogfood - Hydra Visual</title>
    <script src="https://unpkg.com/hydra-synth"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #0a0a0f; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <canvas id="hydra-canvas"></canvas>
    <script>
        const hydra = new Hydra({ canvas: document.getElementById('hydra-canvas') });
        <think>
The user wants generative ambient visuals with evolving textures and micro-rhythms. Let me create a multi-layered Hydra visual that:

1. Uses noise for organic texture evolution
2. Has multiple layers with different speeds for micro-rhythms
3. Uses modulation for organic feel
4. Incorporates color gradients and blends

Let me create a rich ambient visual:

</think>

osc(20, 0.1, 0.8)
.modulate(noise(3, 0.5).scale(1.5))
.scale(0.8)
.rotate(0.02)
.out()

gradient(0.5)
.modulate(noise(2).scrollY(0.02))
.blend(o0)
.out()

noise(0.3, 0.1)
.modulate(osc(50, 0.2))
.scale(1.2)
.scrollX(time(0.1))
.scrollY(time(0.05))
.out()

shape(3, 0.4, 0.9)
.modulate(src(o0).scale(1.1))
.rotate(time(0.3))
.blend(o1)
.out()
    </script>
</body>
</html>
