<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abstract Sculpture</title>
    <style>body { margin: 0; overflow: hidden; background: #000; }</style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        let scene, camera, renderer, composer, controls;
        let sculptureGroup;
        const clock = new THREE.Clock();

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            scene.fog = new THREE.Fog(0x0a0a0a, 10, 50);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 12);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 5;
            controls.maxDistance = 30;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;

            const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambientLight);

            const mainLight = new THREE.DirectionalLight(0xffffff, 2);
            mainLight.position.set(10, 10, 10);
            scene.add(mainLight);

            const secondaryLight = new THREE.DirectionalLight(0x8888ff, 1);
            secondaryLight.position.set(-10, 5, -10);
            scene.add(secondaryLight);

            const accentLight = new THREE.PointLight(0xff6644, 2, 20);
            accentLight.position.set(5, 5, 5);
            scene.add(accentLight);

            const coolLight = new THREE.PointLight(0x44ffff, 2, 20);
            coolLight.position.set(-5, -3, 5);
            scene.add(coolLight);

            createSculpture();

            composer = new EffectComposer(renderer);
            const renderPass = new RenderPass(scene, camera);
            composer.addPass(renderPass);

            const bloomPass = new UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                0.8,
                0.4,
                0.85
            );
            composer.addPass(bloomPass);

            window.addEventListener('resize', onWindowResize);
        }

        function createSculpture() {
            sculptureGroup = new THREE.Group();

            const iridescentMaterial1 = new THREE.MeshPhysicalMaterial({
                color: 0x222222,
                metalness: 0.9,
                roughness: 0.1,
                clearcoat: 1.0,
                clearcoatRoughness: 0.1,
                iridescence: 1.0,
                iridescenceIOR: 1.5,
                iridescenceThicknessRange: [100, 400],
                envMapIntensity: 1.5,
            });

            const iridescentMaterial2 = new THREE.MeshPhysicalMaterial({
                color: 0x1a1a2e,
                metalness: 0.95,
                roughness: 0.05,
                clearcoat: 1.0,
                clearcoatRoughness: 0.0,
                iridescence: 1.0,
                iridescenceIOR: 2.0,
                iridescenceThicknessRange: [200, 500],
                envMapIntensity: 2.0,
            });

            const crystalMaterial = new THREE.MeshPhysicalMaterial({
                color: 0xffffff,
                metalness: 0.0,
                roughness: 0.0,
                transmission: 0.9,
                thickness: 2.0,
                ior: 2.4,
                clearcoat: 1.0,
                iridescence: 0.8,
                iridescenceIOR: 1.8,
            });

            const coreGeometry = new THREE.IcosahedronGeometry(1.5, 1);
            const coreMesh = new THREE.Mesh(coreGeometry, iridescentMaterial1);
            sculptureGroup.add(coreMesh);

            const torusKnot1 = new THREE.TorusKnotGeometry(0.8, 0.25, 128, 32, 2, 3);
            const torusKnotMesh1 = new THREE.Mesh(torusKnot1, iridescentMaterial2);
            torusKnotMesh1.position.set(0, 0, 0);
            sculptureGroup.add(torusKnotMesh1);

            const ringGeometry1 = new THREE.TorusGeometry(2.5, 0.08, 16, 100);
            const ring1 = new THREE.Mesh(ringGeometry1, crystalMaterial);
            ring1.rotation.x = Math.PI / 2;
            sculptureGroup.add(ring1);

            const ring2 = new THREE.Mesh(ringGeometry1.clone(), crystalMaterial);
            ring2.rotation.x = Math.PI / 3;
            ring2.rotation.y = Math.PI / 4;
            sculptureGroup.add(ring2);

            const ring3 = new THREE.Mesh(ringGeometry1.clone(), crystalMaterial);
            ring3.rotation.x = -Math.PI / 5;
            ring3.rotation.z = Math.PI / 3;
            sculptureGroup.add(ring3);

            for (let i = 0; i < 8; i++) {
                const octaGeometry = new THREE.OctahedronGeometry(0.3 + Math.random() * 0.3, 0);
                const octaMesh = new THREE.Mesh(octaGeometry, iridescentMaterial1);
                const angle = (i / 8) * Math.PI * 2;
                const radius = 3.5;
                octaMesh.position.set(
                    Math.cos(angle) * radius,
                    (Math.random() - 0.5) * 2,
                    Math.sin(angle) * radius
                );
                octaMesh.userData.rotationSpeed = {
                    x: (Math.random() - 0.5) * 0.02,
                    y: (Math.random() - 0.5) * 0.02,
                    z: (Math.random() - 0.5) * 0.02
                };
                sculptureGroup.add(octaMesh);
            }

            for (let i = 0; i < 6; i++) {
                const dodecaGeometry = new THREE.DodecahedronGeometry(0.4 + Math.random() * 0.2, 0);
                const dodecaMesh = new THREE.Mesh(dodecaGeometry, iridescentMaterial2);
                const angle = (i / 6) * Math.PI * 2 + Math.PI / 6;
                const radius = 4;
                const height = (Math.random() - 0.5) * 3;
                dodecaMesh.position.set(
                    Math.cos(angle) * radius,
                    height,
                    Math.sin(angle) * radius
                );
                dodecaMesh.userData.rotationSpeed = {
                    x: (Math.random() - 0.5) * 0.015,
                    y: (Math.random() - 0.5) * 0.015,
                    z: (Math.random() - 0.5) * 0.015
                };
                sculptureGroup.add(dodecaMesh);
            }

            for (let i = 0; i < 12; i++) {
                const tetraGeometry = new THREE.TetrahedronGeometry(0.2 + Math.random() * 0.15, 0);
                const tetraMaterial = new THREE.MeshPhysicalMaterial({
                    color: new THREE.Color().setHSL(i / 12, 0.3, 0.4),
                    metalness: 0.8,
                    roughness: 0.2,
                    clearcoat: 0.5,
                    iridescence: 0.6,
                });
                const tetraMesh = new THREE.Mesh(tetraGeometry, tetraMaterial);
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;
                const r = 2.2 + Math.random() * 1.5;
                tetraMesh.position.set(
                    r * Math.sin(phi) * Math.cos(theta),
                    r * Math.cos(phi),
                    r * Math.sin(phi) * Math.sin(theta)
                );
                tetraMesh.userData.orbitRadius = r;
                tetraMesh.userData.orbitSpeed = 0.1 + Math.random() * 0.2;
                tetraMesh.userData.orbitOffset = Math.random() * Math.PI * 2;
                tetraMesh.userData.orbitTilt = Math.random() * 0.5;
                sculptureGroup.add(tetraMesh);
            }

            const smallSphereGeometry = new THREE.SphereGeometry(0.15, 32, 32);
            for (let i = 0; i < 20; i++) {
                const sphereMaterial = new THREE.MeshPhysicalMaterial({
                    color: 0xffffff,
                    metalness: 0.5,
                    roughness: 0.0,
                    transmission: 0.8,
                    thickness: 0.5,
                    iridescence: 0.4,
                });
                const sphere = new THREE.Mesh(smallSphereGeometry, sphereMaterial);
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;
                const r = 1.8 + Math.random() * 2;
                sphere.position.set(
                    r * Math.sin(phi) * Math.cos(theta),
                    r * Math.cos(phi),
                    r * Math.sin(phi) * Math.sin(theta)
                );
                sphere.userData.floatOffset = Math.random() * Math.PI * 2;
                sphere.userData.floatSpeed = 0.5 + Math.random() * 1;
                sculptureGroup.add(sphere);
            }

            sculptureGroup.position.y = 0;
            scene.add(sculptureGroup);

            const platformGeometry = new THREE.CylinderGeometry(6, 6.5, 0.3, 64);
            const platformMaterial = new THREE.MeshPhysicalMaterial({
                color: 0x111111,
                metalness: 0.8,
                roughness: 0.3,
            });
            const platform = new THREE.Mesh(platformGeometry, platformMaterial);
            platform.position.y = -4;
            scene.add(platform);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            sculptureGroup.children.forEach((child, index) => {
                if (child.geometry instanceof THREE.IcosahedronGeometry && child.geometry.parameters.detail === 1) {
                    child.rotation.x = time * 0.1;
                    child.rotation.y = time * 0.15;
                }
                else if (child.geometry instanceof THREE.TorusKnotGeometry) {
                    child.rotation.x = time * 0.2;
                    child.rotation.y = time * 0.3;
                }

                if (child.userData.rotationSpeed) {
                    child.rotation.x += child.userData.rotationSpeed.x;
                    child.rotation.y += child.userData.rotationSpeed.y;
                    child.rotation.z += child.userData.rotationSpeed.z;
                }

                if (child.userData.orbitRadius) {
                    const angle = time * child.userData.orbitSpeed + child.userData.orbitOffset;
                    const tilt = child.userData.orbitTilt;
                    child.position.x = child.userData.orbitRadius * Math.cos(angle);
                    child.position.y = child.userData.orbitRadius * Math.sin(angle) * Math.sin(tilt);
                    child.position.z = child.userData.orbitRadius * Math.sin(angle);
                    child.rotation.x = time * 0.5;
                    child.rotation.y = time * 0.3;
                }

                if (child.userData.floatOffset !== undefined) {
                    child.position.y += Math.sin(time * child.userData.floatSpeed + child.userData.floatOffset) * 0.002;
                }
            });

            const rings = sculptureGroup.children.filter(c => c.geometry instanceof THREE.TorusGeometry && c.geometry.parameters.tube > 0.1);
            rings.forEach((ring, index) => {
                ring.rotation.z = time * (0.2 + index * 0.1);
            });

            controls.update();
            composer.render();
        }
    </script>
</body>
</html>
