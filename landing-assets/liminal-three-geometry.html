        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);

        controls.maxDistance = 50;

        // Post-processing
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);

        const bloomPass = new UnrealBloomPass(

            0.8, 0.4, 0.85

            { geo: new THREE.SphereGeometry(1.3, 32, 32), color: 0xa29bfe, pos: [4, 2, -4], name: 'Sphere' }
        ];

        // Create meshes
        const meshes = [];
        geometries.forEach((item, index) => {
            const material = new THREE.MeshStandardMaterial({
                color: item.color,
                metalness: 0.3,
                roughness: 0.4,
                emissive: item.color,
                emissiveIntensity: 0.15
            });

            const mesh = new THREE.Mesh(item.geo, material);
            mesh.position.set(...item.pos);
            mesh.userData = {
                originalY: item.pos[1],
                rotationSpeed: {
                    x: (Math.random() - 0.5) * 0.01,
                    y: (Math.random() - 0.5) * 0.02 + 0.01,
                    z: (Math.random() - 0.5) * 0.01
                },
                floatOffset: Math.random() * Math.PI * 2,
                name: item.name
            };

            scene.add(mesh);
            meshes.push(mesh);
        });

        // Wireframe versions
        meshes.forEach((mesh, index) => {
            const wireframeGeo = mesh.geometry.clone();
            const wireframeMat = new THREE.MeshBasicMaterial({
                color: mesh.material.color,
                wireframe: true,
                transparent: true,
                opacity: 0.1
            });
            const wireframe = new THREE.Mesh(wireframeGeo, wireframeMat);
            wireframe.position.copy(mesh.position);
            wireframe.scale.setScalar(1.01);
            mesh.userData.wireframe = wireframe;
            scene.add(wireframe);
        });
