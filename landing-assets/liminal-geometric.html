<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>p5.js Sketch</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
        }
        main {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <main>
        <script>
<think>
The user wants me to create a p5.js sketch with colorful geometric shapes. Let me create an engaging, generative art piece that uses Perlin noise for organic variation and features various geometric shapes with dynamic colors and movement.

I'll create something visually interesting with:
- Multiple types of geometric shapes (circles, triangles, rectangles, hexagons, etc.)
- Colorful gradients and palettes
- Noise-based movement and variation
- Smooth, organic animation
- A cohesive artistic style

Let me write the complete p5.js sketch:
</think>

let shapes = [];
let numShapes = 60;
let colorPalette;

function setup() {
  createCanvas(800, 600);
  pixelDensity(1);
  noiseSeed(random(1000));
  colorMode(HSB, 360, 100, 100, 100);
  
  colorPalette = [
    [320, 85, 95],
    [200, 90, 85],
    [45, 95, 90],
    [280, 75, 90],
    [160, 85, 80],
    [0, 85, 95],
    [60, 90, 85],
    [240, 80, 88]
  ];
  
  for (let i = 0; i < numShapes; i++) {
    shapes.push(createShape());
  }
}

function createShape() {
  let types = ['circle', 'triangle', 'rect', 'ellipse', 'quad', 'hexagon'];
  return {
    x: random(width),
    y: random(height),
    size: random(20, 80),
    type: random(types),
    hue: random(360),
    saturation: random(60, 100),
    brightness: random(70, 100),
    alpha: random(40, 80),
    noiseOffsetX: random(1000),
    noiseOffsetY: random(1000),
    noiseOffsetSize: random(1000),
    speed: random(0.3, 1.2),
    rotation: random(TWO_PI),
    rotationSpeed: random(-0.02, 0.02),
    layer: floor(random(3))
  };
}

function draw() {
  background(0, 0, 8);
  
  let sortedShapes = [...shapes].sort((a, b) => a.layer - b.layer);
  
  for (let shape of sortedShapes) {
    let noiseX = map(noise(shape.noiseOffsetX), 0, 1, -50, 50);
    let noiseY = map(noise(shape.noiseOffsetY), 0, 1, -50, 50);
    let noiseSize = map(noise(shape.noiseOffsetSize), 0, 1, 0.5, 1.3);
    
    shape.x += noiseX * 0.02 * shape.speed;
    shape.y += noiseY * 0.02 * shape.speed;
    shape.rotation += shape.rotationSpeed;
    
    if (shape.x < -100) shape.x = width + 100;
    if (shape.x > width + 100) shape.x = -100;
    if (shape.y < -100) shape.y = height + 100;
    if (shape.y > height + 100) shape.y = -100;
    
    shape.noiseOffsetX += 0.005;
    shape.noiseOffsetY += 0.005;
    shape.noiseOffsetSize += 0.003;
    
    let currentSize = shape.size * noiseSize;
    let colorShift = noise(shape.noiseOffsetX * 0.5) * 60;
    let currentHue = (shape.hue + colorShift) % 360;
    
    push();
    translate(shape.x, shape.y);
    rotate(shape.rotation);
    
    noStroke();
    fill(currentHue, shape.saturation, shape.brightness, shape.alpha);
    
    if (shape.type === 'circle') {
      ellipse(0, 0, currentSize, currentSize);
      fill(currentHue, shape.saturation - 20, shape.brightness, shape.alpha * 0.5);
      ellipse(currentSize * 0.3, -currentSize * 0.3, currentSize * 0.4, currentSize * 0.4);
    } 
    else if (shape.type === 'ellipse') {
      ellipse(0, 0, currentSize * 1.5, currentSize * 0.7);
    }
    else if (shape.type === 'triangle') {
      let h = currentSize * sqrt(3) / 2;
      triangle(0, -h * 0.6, -currentSize * 0.5, h * 0.4, currentSize * 0.5, h * 0.4);
    }
    else if (shape.type === 'rect') {
      rectMode(CENTER);
      rect(0, 0, currentSize, currentSize, 5);
      fill(currentHue, shape.saturation - 15, shape.brightness - 10, shape.alpha * 0.6);
      rect(0, 0, currentSize * 0.5, currentSize * 0.5, 3);
    }
    else if (shape.type === 'quad') {
      beginShape();
      vertex(-currentSize * 0.5, -currentSize * 0.3);
      vertex(currentSize * 0.3, -currentSize * 0.5);
      vertex(currentSize * 0.5, currentSize * 0.3);
      vertex(-currentSize * 0.3, currentSize * 0.5);
      endShape(CLOSE);
    }
    else if (shape.type === 'hexagon') {
      drawHexagon(0, 0, currentSize * 0.5);
    }
    
    pop();
  }
  
  drawConnectingLines();
}

function drawHexagon(x, y, radius) {
  beginShape();
  for (let i = 0; i < 6; i++) {
    let angle = TWO_PI / 6 * i - PI / 6;
    vertex(x + cos(angle) * radius, y + sin(angle) * radius);
  }
  endShape(CLOSE);
}

function drawConnectingLines() {
  stroke(0, 0, 100, 5);
  strokeWeight(0.5);
  
  for (let i = 0; i < shapes.length; i++) {
    for (let j = i + 1; j < shapes.length; j++) {
      let d = dist(shapes[i].x, shapes[i].y, shapes[j].x, shapes[j].y);
      if (d < 120) {
        let alpha = map(d, 0, 120, 15, 0);
        stroke(0, 0, 100, alpha);
        line(shapes[i].x, shapes[i].y, shapes[j].x, shapes[j].y);
      }
    }
  }
}

function mousePressed() {
  noiseSeed(random(1000));
  for (let shape of shapes) {
    shape.x = random(width);
    shape.y = random(height);
    shape.noiseOffsetX = random(1000);
    shape.noiseOffsetY = random(1000);
    shape.hue = random(360);
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
        </script>
    </main>
</body>
</html>
