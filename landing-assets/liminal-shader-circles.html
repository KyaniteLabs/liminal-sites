<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>p5.js Sketch</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
        }
        main {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <main>
        <script>
<think>
The user wants a creative fragment shader featuring circles. Let me create something visually interesting using circles - I'll make it generative and animated with various circle patterns, perhaps with some distortion, noise, and smooth animations.

I'll create a shader with:
1. Multiple layers of circles with different patterns
2. Smooth animations using u_time
3. Some organic variation using noise
4. Color transitions
5. Maybe some mouse interactivity with u_mouse

Let me write this as a single GLSL fragment shader with the standard uniforms.
</think>

precision highp float;

#define PI 3.14159265359
#define TAU 6.28318530718

uniform vec2 u_resolution;
uniform float u_time;
uniform vec2 u_mouse;

float hash(vec2 p) {
    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
}

vec2 hash2(vec2 p) {
    p = vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)));
    return fract(sin(p) * 43758.5453123);
}

float noise(vec2 p) {
    vec2 i = floor(p);
    vec2 f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    float a = hash(i);
    float b = hash(i + vec2(1.0, 0.0));
    float c = hash(i + vec2(0.0, 1.0));
    float d = hash(i + vec2(1.0, 1.0));
    return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}

float fbm(vec2 p) {
    float value = 0.0;
    float amplitude = 0.5;
    for(int i = 0; i < 4; i++) {
        value += amplitude * noise(p);
        p *= 2.0;
        amplitude *= 0.5;
    }
    return value;
}

float circle(vec2 uv, vec2 center, float radius) {
    float d = length(uv - center);
    return smoothstep(radius, radius - 0.01, d);
}

float ring(vec2 uv, vec2 center, float radius, float thickness) {
    float d = length(uv - center);
    float inner = smoothstep(radius - thickness, radius - thickness + 0.01, d);
    float outer = smoothstep(radius, radius - 0.01, d);
    return inner * outer;
}

vec3 palette(float t) {
    vec3 a = vec3(0.5, 0.5, 0.5);
    vec3 b = vec3(0.5, 0.5, 0.5);
    vec3 c = vec3(1.0, 1.0, 1.0);
    vec3 d = vec3(0.263, 0.416, 0.557);
    return a + b * cos(TAU * (c * t + d));
}

void main() {
    vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / min(u_resolution.x, u_resolution.y);
    vec2 mouse = u_mouse;
    
    vec3 col = vec3(0.0);
    
    float t = u_time * 0.3;
    
    // Central pulsing circle
    vec2 center = vec2(0.0);
    float pulse = sin(t * 2.0) * 0.1 + 0.3;
    float c = circle(uv, center, pulse);
    col += c * palette(t * 0.5);
    
    // Expanding rings from center
    for(int i = 0; i < 5; i++) {
        float fi = float(i);
        float radius = mod(t + fi * 0.2, 1.5);
        float thickness = 0.02 + 0.01 * sin(fi + t);
        float r = ring(uv, center, radius, thickness);
        col += r * palette(t * 0.3 + fi * 0.2) * (1.0 - radius * 0.5);
    }
    
    // Grid of circles with noise displacement
    vec2 gridSize = vec2(5.0, 5.0);
    vec2 gv = fract(uv * gridSize) - 0.5;
    vec2 id = floor(uv * gridSize);
    
    for(int y = -1; y <= 1; y++) {
        for(int x = -1; x <= 1; x++) {
            vec2 offset = vec2(float(x), float(y));
            vec2 nid = id + offset;
            
            float h = hash(nid);
            float h2 = hash(nid + 100.0);
            
            vec2 nPos = offset + 0.5;
            nPos += (hash2(nid) - 0.5) * 0.4;
            nPos += vec2(sin(t + h * TAU), cos(t * 0.7 + h2 * TAU)) * 0.15;
            
            float cr = 0.1 + 0.08 * sin(t * 1.5 + h * TAU);
            float circ = circle(gv, nPos - 0.5, cr);
            
            vec3 cCol = palette(h + t * 0.2);
            col += circ * cCol * 0.6;
        }
    }
    
    // Mouse interactive circles
    vec2 mUV = mouse - 0.5;
    mUV.x *= u_resolution.x / u_resolution.y;
    for(int i = 0; i < 8; i++) {
        float fi = float(i);
        float angle = t * 0.8 + fi * TAU / 8.0;
        float dist = 0.2 + 0.1 * sin(t * 2.0 + fi);
        vec2 pos = mUV + vec2(cos(angle), sin(angle)) * dist;
        float cr = 0.05 + 0.03 * sin(t * 3.0 + fi * 2.0);
        float circ = circle(uv, pos, cr);
        col += circ * palette(t + fi * 0.3) * 0.7;
    }
    
    // Flowing circular waves
    float wave = fbm(uv * 3.0 + vec2(t * 0.5, 0.0));
    float angle = atan(uv.y, uv.x);
    float dist = length(uv);
    float spiral = sin(angle * 6.0 + t * 2.0 - dist * 10.0 + wave * 3.0);
    spiral = smoothstep(0.7, 0.9, spiral) * (1.0 - dist);
    col += spiral * palette(t * 0.4 + dist) * 0.3;
    
    // Vignette
    float vig = 1.0 - length(uv) * 0.5;
    col *= vig;
    
    // Gamma correction
    col = pow(col, vec3(0.8));
    
    gl_FragColor = vec4(col, 1.0);
}
        </script>
    </main>
</body>
</html>
