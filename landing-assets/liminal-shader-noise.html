<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>p5.js Sketch</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
        }
        main {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <main>
        <script>
<think>
The user wants a GLSL fragment shader that uses noise for creative visual effects. I'll create an organic, flowing visual using noise functions like value noise or simplex noise, with smooth animation over time.

Let me create a shader that:
1. Uses 2D noise for organic patterns
2. Animates smoothly with u_time
3. Includes proper uniforms (u_resolution, u_time, u_mouse)
4. Creates an interesting generative visual - maybe a flowing, liquid-like effect with multiple layers of noise
5. Works at 60fps with efficient code

I'll implement a layered noise approach with domain warping for more interesting visuals.
</think>

precision highp float;

uniform vec2 u_resolution;
uniform float u_time;
uniform vec2 u_mouse;

#define PI 3.14159265359

float hash(vec2 p) {
    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

float noise(vec2 p) {
    vec2 i = floor(p);
    vec2 f = fract(p);
    vec2 u = f * f * (3.0 - 2.0 * f);
    
    float a = hash(i);
    float b = hash(i + vec2(1.0, 0.0));
    float c = hash(i + vec2(0.0, 1.0));
    float d = hash(i + vec2(1.0, 1.0));
    
    return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
}

float fbm(vec2 p) {
    float value = 0.0;
    float amplitude = 0.5;
    float frequency = 1.0;
    
    for(int i = 0; i < 5; i++) {
        value += amplitude * noise(p * frequency);
        amplitude *= 0.5;
        frequency *= 2.0;
    }
    return value;
}

float ridged(vec2 p) {
    float n = noise(p);
    return 1.0 - abs(n * 2.0 - 1.0);
}

void main() {
    vec2 uv = gl_FragCoord.xy / u_resolution.xy;
    vec2 p = uv * 2.0 - 1.0;
    p.x *= u_resolution.x / u_resolution.y;
    
    float t = u_time * 0.15;
    
    vec2 q = vec2(
        fbm(p + vec2(0.0, 0.0) + t * 0.5),
        fbm(p + vec2(5.2, 1.3) + t * 0.3)
    );
    
    vec2 r = vec2(
        fbm(p + 4.0 * q + vec2(1.7, 9.2) + t * 0.2),
        fbm(p + 4.0 * q + vec2(8.3, 2.8) + t * 0.15)
    );
    
    float f = fbm(p + 4.0 * r);
    
    float ridgedNoise = ridged(p + 2.0 * q + t * 0.4);
    
    vec3 col1 = vec3(0.2, 0.4, 0.8);
    vec3 col2 = vec3(0.8, 0.3, 0.5);
    vec3 col3 = vec3(0.1, 0.7, 0.6);
    vec3 col4 = vec3(0.9, 0.8, 0.3);
    
    vec3 color = mix(col1, col2, smoothstep(0.0, 1.0, f));
    color = mix(color, col3, smoothstep(0.3, 0.8, length(q)));
    color = mix(color, col4, smoothstep(0.4, 0.9, ridgedNoise));
    
    color += 0.3 * vec3(f);
    color *= 1.0 + 0.5 * sin(length(q) * PI * 2.0 + t * 2.0);
    
    float glow = pow(1.0 - length(fract(p * 3.0) - 0.5), 3.0);
    color += glow * 0.2 * col2;
    
    color = pow(color, vec3(0.9));
    color *= 1.0 - 0.2 * length(p);
    
    gl_FragColor = vec4(color, 1.0);
}
        </script>
    </main>
</body>
</html>
