<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>p5.js Sketch</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
        }
        main {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <main>
        <script>
// Generated by Liminal ParticleSystem
// Particle Count: 100

// Seed: 1595241640

let particles = [];

function setup() {
  createCanvas(600, 400);
  // RGB color mode
  colorMode(RGB);

  // Initialize particles
  for (let i = 0; i < 100; i++) {
    particles.push(new Particle());
  }
}

function draw() {
  background(0);

  // Update and display particles
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].display();

    // Remove dead particles
    if (particles[i].lifespan < 1) {
      particles.splice(i, 1);
    }
  }

  
}

class Particle {
  constructor() {
    this.x = random(width);
    this.y = random(height);
    this.vx = random(-2, 2);
    this.vy = random(-2, 2);
    this.size = random(2, 8);
    this.lifespan = 255;
    // RGB full spectrum
this.baseColor = color(random(255), random(255), random(255));

  }

  update() {
    

    // Apply velocity
    this.x += this.vx;
    this.y += this.vy;

    // Wrap around edges
    if (this.x < 0) this.x = width;
    if (this.x > width) this.x = 0;
    if (this.y < 0) this.y = height;
    if (this.y > height) this.y = 0;

    // Apply decay
    this.lifespan *= 0.98;

    // Update color based on velocity
    let speed = sqrt(this.vx * this.vx + this.vy * this.vy);
    let colorRatio = constrain(speed / 4, 0, 1);
    this.color = lerpColor(
      color(255, 100, 100),
      color(100, 100, 255),
      colorRatio
    );
  }

  display() {
    noStroke();
    fill(this.color, this.lifespan);
    ellipse(this.x, this.y, this.size);
  }

  
}

        </script>
    </main>
</body>
</html>
