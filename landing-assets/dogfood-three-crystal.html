<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Chamber</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-family: 'Courier New', monospace;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="info">Drag to rotate • Scroll to zoom</div>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

        let scene, camera, renderer, composer, controls;
        let crystals = [];
        let time = 0;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510);
            scene.fog = new THREE.FogExp2(0x050510, 0.015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxDistance = 50;
            controls.minDistance = 5;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;

            createEnvironment();
            createLights();
            createCrystals();
            createParticles();
            setupPostProcessing();

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function createEnvironment() {
            const pmremGenerator = new THREE.PMREMGenerator(renderer);
            pmremGenerator.compileEquirectangularShader();

            const envScene = new THREE.Scene();
            
            const gradientMaterial = new THREE.ShaderMaterial({
                side: THREE.BackSide,
                uniforms: {
                    topColor: { value: new THREE.Color(0x1a0033) },
                    bottomColor: { value: new THREE.Color(0x000033) }
                },
                vertexShader: `
                    varying vec3 vWorldPosition;
                    void main() {
                        vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                        vWorldPosition = worldPosition.xyz;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform vec3 topColor;
                    uniform vec3 bottomColor;
                    varying vec3 vWorldPosition;
                    void main() {
                        float h = normalize(vWorldPosition).y * 0.5 + 0.5;
                        gl_FragColor = vec4(mix(bottomColor, topColor, h), 1.0);
                    }
                `
            });

            const envGeometry = new THREE.SphereGeometry(100, 32, 32);
            const envMesh = new THREE.Mesh(envGeometry, gradientMaterial);
            envScene.add(envMesh);

            const envRT = pmremGenerator.fromScene(envScene);
            scene.environment = envRT.texture;
        }

        function createLights() {
            const ambientLight = new THREE.AmbientLight(0x222244, 0.5);
            scene.add(ambientLight);

            const pointLight1 = new THREE.PointLight(0xff00ff, 2, 50);
            pointLight1.position.set(10, 10, 10);
            scene.add(pointLight1);

            const pointLight2 = new THREE.PointLight(0x00ffff, 2, 50);
            pointLight2.position.set(-10, 10, -10);
            scene.add(pointLight2);

            const pointLight3 = new THREE.PointLight(0xff0066, 1.5, 50);
            pointLight3.position.set(0, -5, 15);
            scene.add(pointLight3);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
            directionalLight.position.set(5, 20, 5);
            scene.add(directionalLight);

            const spotLight = new THREE.SpotLight(0x8844ff, 3, 60, Math.PI / 6, 0.5);
            spotLight.position.set(0, 30, 0);
            spotLight.target.position.set(0, 0, 0);
            scene.add(spotLight);
            scene.add(spotLight.target);
        }

        function createCrystals() {
            const crystalConfigs = [
                { geometry: new THREE.IcosahedronGeometry(2, 0), position: [0, 0, 0], color: 0x88ffff, scale: 1 },
                { geometry: new THREE.OctahedronGeometry(1.5, 0), position: [6, 2, -3], color: 0xff88ff, scale: 1 },
                { geometry: new THREE.OctahedronGeometry(1.5, 0), position: [-6, -1, -4], color: 0x88ff88, scale: 1 },
                { geometry: new THREE.TetrahedronGeometry(2, 0), position: [-4, 3, 2], color: 0xffff88, scale: 1 },
                { geometry: new THREE.TetrahedronGeometry(1.8, 0), position: [5, -2, 4], color: 0xff8888, scale: 1 },
                { geometry: new THREE.DodecahedronGeometry(1.2, 0), position: [-3, -3, 5], color: 0x88ffff, scale: 1 },
                { geometry: new THREE.IcosahedronGeometry(1, 0), position: [8, 4, -6], color: 0xff88ff, scale: 1 },
                { geometry: new THREE.OctahedronGeometry(0.8, 0), position: [-7, 2, -2], color: 0xffffff, scale: 1 },
                { geometry: new THREE.TetrahedronGeometry(1.2, 0), position: [3, -4, -5], color: 0x88ff88, scale: 1 },
                { geometry: new THREE.IcosahedronGeometry(0.6, 0), position: [-5, 0, 6], color: 0xff88ff, scale: 1 },
                { geometry: new THREE.DodecahedronGeometry(0.9, 0), position: [7, -3, 2], color: 0xffff88, scale: 1 },
                { geometry: new THREE.OctahedronGeometry(1.1, 0), position: [-2, 5, -6], color: 0x88ffff, scale: 1 },
            ];

            crystalConfigs.forEach((config, index) => {
                const material = new THREE.MeshPhysicalMaterial({
                    color: config.color,
                    metalness: 0.1,
                    roughness: 0.05,
                    transmission: 0.6,
                    thickness: 1.5,
                    envMapIntensity: 1.5,
                    clearcoat: 1,
                    clearcoatRoughness: 0.1,
                    ior: 2.4,
                    transparent: true,
                    opacity: 0.9,
                    side: THREE.DoubleSide
                });

                const crystal = new THREE.Mesh(config.geometry, material);
                crystal.position.set(...config.position);
                crystal.scale.setScalar(config.scale);
                crystal.rotation.set(
                    Math.random() * Math.PI,
                    Math.random() * Math.PI,
                    Math.random() * Math.PI
                );

                crystal.userData = {
                    rotationSpeed: {
                        x: (Math.random() - 0.5) * 0.01,
                        y: (Math.random() - 0.5) * 0.01,
                        z: (Math.random() - 0.5) * 0.01
                    },
                    floatSpeed: 0.5 + Math.random() * 0.5,
                    floatOffset: Math.random() * Math.PI * 2,
                    originalY: config.position[1]
                };

                scene.add(crystal);
                crystals.push(crystal);
            });
        }

        function createParticles() {
            const particleCount = 500;
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            const colorPalette = [
                new THREE.Color(0xff00ff),
                new THREE.Color(0x00ffff),
                new THREE.Color(0xffffff),
                new THREE.Color(0x8844ff)
            ];

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                const radius = 20 + Math.random() * 30;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.random() * Math.PI;

                positions[i3] = radius * Math.sin(phi) * Math.cos(theta);
                positions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                positions[i3 + 2] = radius * Math.cos(phi);

                const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                colors[i3] = color.r;
                colors[i3 + 1] = color.g;
                colors[i3 + 2] = color.b;
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.1,
                vertexColors: true,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending
            });

            const particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        function setupPostProcessing() {
            composer = new EffectComposer(renderer);

            const renderPass = new RenderPass(scene, camera);
            composer.addPass(renderPass);

            const bloomPass = new UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                0.8,
                0.4,
                0.85
            );
            composer.addPass(bloomPass);

            const outputPass = new OutputPass();
            composer.addPass(outputPass);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            crystals.forEach((crystal) => {
                const userData = crystal.userData;
                crystal.rotation.x += userData.rotationSpeed.x;
                crystal.rotation.y += userData.rotationSpeed.y;
                crystal.rotation.z += userData.rotationSpeed.z;
                crystal.position.y = userData.originalY + Math.sin(time * userData.floatSpeed + userData.floatOffset) * 0.5;
            });

            controls.update();
            composer.render();
        }

        init();
    </script>
</body>
</html>
