    - paragraph [ref=e13]:
      - text: This is not the run that produced our final reported harness. It is an earlier, smaller search run that we find especially instructive for understanding what Meta-Harness does internally. We deliberately chose a
      - strong [ref=e14]: hard 19-task subset
      - text: where most agents struggle (note the low baseline scores), so that improvements from pure harness changes would be clearly visible. Starting from Terminus-KIRA (28.5%), the search reaches
      - strong [ref=e15]: 46.5%
      - text: by iteration 7.
    - paragraph [ref=e16]:
      - text: Step through the iterations to see the proposer's reasoning. It performs counterfactual diagnosis across execution traces, identifies specific failure modes by reading raw logs through the filesystem, and proposes targeted fixes. Each proposal is grounded in concrete evidence from prior runs. Full-benchmark results on all 89 tasks are in the
      - link "Results" [ref=e17] [cursor=pointer]:
