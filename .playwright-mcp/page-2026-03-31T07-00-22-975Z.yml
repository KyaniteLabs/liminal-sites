    - generic [ref=e130]:
      - heading "Results" [level=2] [ref=e131]
      - heading "Text Classification" [level=3] [ref=e132]
      - paragraph [ref=e133]: "We follow the online text classification setup of ACE: an LLM receives labeled examples one at a time, updates its memory, and is evaluated on a held-out test set. We search over harnesses using three datasets — LawBench (215 classes), Symptom2Disease (22 classes), and USPTO-50k (180 classes) — with GPT-OSS-120B as the model. We ran 20 evolution iterations with two candidates per iteration, producing 40 candidate harnesses. All test sets are held out until the final evaluation."
      - generic [ref=e134]:
        - text: The best discovered harness (
        - emphasis [ref=e135]: Label-Primed Query
        - text: ) achieves
        - strong [ref=e136]: 48.6%
        - text: vs. ACE’s 40.9% — a
        - strong [ref=e137]: 7.7-point improvement
        - text: using
        - strong [ref=e138]: 4× fewer context tokens
        - text: ". Gains concentrate on tasks with large, confusable label spaces: LawBench (215 classes) sees +16 points, Symptom2Disease +9 points. None of the discovered harnesses require additional LLM calls beyond the main task-solving call."
