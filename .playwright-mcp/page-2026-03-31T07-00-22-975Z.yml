  - generic [ref=e58]:
    - generic [ref=e59]:
      - img "Meta-Harness method overview." [ref=e60]
      - generic [ref=e61]:
        - strong [ref=e62]: Meta-Harness search loop.
        - text: (1) An agent reads a filesystem containing all prior candidates' source code, execution traces, and scores, and proposes a new harness. (2) We evaluate the proposed harness on held-out tasks. (3) All logs are stored in the filesystem, and the loop repeats.
    - generic [ref=e63]:
      - heading "What Makes This Different" [level=2] [ref=e64]
      - paragraph [ref=e65]: There are many methods for optimizing text and code with LLM feedback. The key difference is how much the optimizer gets to see. Most prior methods compress everything into a short summary, a scalar score, or a sliding window of recent candidates. That works for small problems, but harness engineering produces failures that are hard to diagnose without seeing the raw execution trace.
      - paragraph [ref=e66]:
        - text: "Meta-Harness takes a different approach: it gives the proposer a filesystem containing the full source code, scores, and execution traces of every prior candidate. The proposer is a coding agent (Claude Code) that reads what it needs via"
        - code [ref=e67]: grep
        - text: ","
        - code [ref=e68]: cat
        - text: ", and other standard tools. In practice, this means up to 10M tokens of diagnostic context per step, vs. at most 26K for all prior methods we surveyed. The result is that the proposer can trace a failure back to the specific harness decision that caused it, rather than guessing from a score. See"
        - link "the paper" [ref=e69] [cursor=pointer]:
          - /url: https://arxiv.org/abs/2603.28052
        - text: for details.
