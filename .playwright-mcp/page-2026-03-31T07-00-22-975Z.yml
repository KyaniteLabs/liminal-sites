      - paragraph [ref=e221]:
        - text: We also directly compare Meta-Harness against two representative program-search methods, OpenEvolve and TTT-Discover (with PUCT selection), giving each the same proposer and evaluation budget. Meta-Harness matches their final accuracy with
        - strong [ref=e222]: 10× fewer evaluations
        - text: ", and its final accuracy surpasses theirs by more than 10 points. We attribute this to the filesystem-based interface: both OpenEvolve and PUCT compress history into a fixed prompt format, discarding the execution traces that Meta-Harness uses for targeted diagnosis."
      - generic [ref=e223]:
        - img "Meta-Harness learning curves vs baselines"
        - generic [ref=e224]:
          - strong [ref=e225]: Search progress over ~60 proposals.
          - text: Meta-Harness (red) outperforms all baselines and reaches the next-best optimizer’s final accuracy in just 4 iterations. TTT-Discover, Best-of-N, OpenEvolve, ACE, few-shot, and zero-shot shown for comparison.
      - heading "Math Reasoning" [level=3] [ref=e226]
      - paragraph [ref=e227]: "We study retrieval-augmented math solving: a language model is given retrieved examples from a large corpus before attempting each problem. Meta-Harness searches over retrieval programs that can implement arbitrary filtering, branching, and formatting logic using corpus metadata and BM25 scores. The corpus contains ≥500K problems drawn from eight open-source datasets. We evolve a single retrieval harness on a 250-problem search set, then evaluate it on 200 held-out IMO-level problems. The same harness is then tested on five models unseen during search, directly measuring transfer."
      - generic [ref=e228]:
        - text: A single discovered retrieval harness improves accuracy by
        - strong [ref=e229]: +4.7 points
        - text: on average (34.1% → 38.8%) across five held-out models. It matches or exceeds the strongest fixed baselines on average, outperforming BM25 retrieval by 1.3 points overall.
