name: Documentation Validation

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-docs:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Version Consistency Check
      - name: Check Version Consistency
        run: node -e "const pkg = require('./package.json'); console.log('Package version:', pkg.version); console.log('OK');"
