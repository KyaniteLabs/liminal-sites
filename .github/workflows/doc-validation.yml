name: Documentation Validation

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-docs:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Ensure clean pnpm setup
        run: rm -rf ~/setup-pnpm/node_modules/.bin/store 2>/dev/null || true
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install

      # Version Consistency Check
      - name: Check Version Consistency
        run: node -e "const pkg = require('./package.json'); console.log('Package version:', pkg.version); console.log('OK');"
