name: Documentation Validation

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: liminal-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Check Version Consistency
        run: node -e "const pkg = require('./package.json'); console.log('Package version:', pkg.version); console.log('OK');"
      - name: Check Documentation Links
        run: node scripts/ci/check-doc-links.mjs
