name: Blacksmith Probe

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  probe:
    name: Blacksmith Probe
    runs-on: ubuntu-latest
    steps:
      - name: Confirm GitHub-hosted fallback
        run: |
          echo "Blacksmith is optional for this repository."
          echo "Required probe satisfied on ubuntu-latest so free-tier queue limits do not block PRs."
