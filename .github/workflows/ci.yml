name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install chromium || true
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test:coverage
      - name: Check coverage gaps
        if: always()
        run: npx tsx scripts/ci/check-coverage-gaps.ts --warn
      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Coverage Summary"
            node -e "
              const s = require('./coverage/coverage-summary.json');
              const t = s.total;
              console.log('| Metric | Covered | Total | % |');
              console.log('|--------|---------|-------|---|');
              for (const [k,v] of [['Statements','lines'],['Branches','branches'],['Functions','functions'],['Lines','lines']]) {
                console.log('| '+k+' | '+t[v].covered+' | '+t[v].total+' | '+t[v].pct+'% |');
              }
            "
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
