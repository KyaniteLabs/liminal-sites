<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generated Output</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.10/p5.min.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; }
        main { box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>
    <main>
        <script>
let angle = 0;
let radius = 100;

function setup() {
  createCanvas(windowWidth, windowHeight);
  background(220);
}

function draw() {
  background(30, 30, 50); // Darker background for contrast
  
  let centerX = width / 2;
  let centerY = height / 2;
  
  // Animate the circle size and position
  let x = centerX + cos(angle) * radius;
  let y = centerY + sin(angle) * radius;
  let d = map(sin(frameCount * 0.1), -1, 1, 30, 80);
  
  // Draw a trail effect
  fill(255, 30);
  noStroke();
  rect(0, 0, width, height);
  
  // Draw the main animated circle
  noStroke();
  let red = map(sin(frameCount * 0.05), -1, 1, 100, 255);
  let green = map(cos(frameCount * 0.03), -1, 1, 100, 255);
  let blue = map(sin(frameCount * 0.07), -1, 1, 100, 255);
  fill(red, green, blue);
  
  circle(x, y, d);
  
  // Draw a connecting line to center
  stroke(200, 50);
  strokeWeight(2);
  line(centerX, centerY, x, y);
  
  angle += 0.03;
}
        </script>
    </main>
</body>
</html>
