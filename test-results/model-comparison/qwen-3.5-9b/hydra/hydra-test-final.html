<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generated Output</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; }
        main { box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>
    <main>
        <script>
function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 50, 255);
  background(0);
}

function draw() {
  noStroke();
  
  // Add feedback trail by drawing a semi-transparent black rect
  fill(0, 0, 0, 20);
  rect(0, 0, width, height);
  
  let x = random(width);
  let y = random(height);
  
  for (let i = 0; i < 40; i++) {
    // Decreasing size and opacity for trail effect
    let s = map(i, 0, 40, 30, 2);
    let h = map(i, 0, 40, 0, 360);
    
    // Random geometric shapes
    if (i % 3 === 0) {
      fill(h, 80, s * 5);
      circle(x, y, s);
    } else if (i % 3 === 1) {
      fill(h + 60, 90, s * 5);
      rectMode(CENTER);
      rect(x, y, s, s);
    } else {
      // Triangle
      let triX = x;
      let triY = y;
      let triS = s / 1.732;
      
      beginShape();
      vertex(triX, triY - triS);
      vertex(triX + triS, triY + triS);
      vertex(triX - triS, triY + triS);
      endShape(CLOSE);
    }
    
    // Move origin slightly for dynamic trail
    x += random(-10, 10);
    y += random(-5, 5);
  }
  
  // Randomly spawn a burst every few frames
  if (frameCount % 2 === 0) {
    let bx = width / 2 + random(-width/4, width/4);
    let by = height / 2 + random(-height/4, height/4);
    
    for(let j=0; j<15; j++) {
      let angle = map(j, 0, 15, 0, TWO_PI * 2);
      let speed = random(5, 20);
      let vx = cos(angle) * speed;
      let vy = sin(angle) * speed;
      
      // Simulate particle trail logic (simplified for single frame burst)
      fill(random(360), 100, 80);
      circle(bx + vx, by + vy, random(2, 8));
    }
  }
}
        </script>
    </main>
</body>
</html>
