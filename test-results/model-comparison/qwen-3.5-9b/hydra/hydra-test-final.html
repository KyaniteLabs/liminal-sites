<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generated Output</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; }
        main { box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>
    <main>
        <script>
let history = [];
const colors = [color(255), color(100, 200, 255), color(255, 100, 100), color(100, 255, 100)];
let shapes = ['circle', 'square', 'triangle'];

function setup() {
  createCanvas(windowWidth, windowHeight);
  noStroke();
}

function draw() {
  background(10, 10, 30, 20);
  
  // Add new point to history with random shape and color
  let type = floor(random(4));
  let x = width * (random()) + random(-50, 50);
  let y = height * (random()) + random(-50, 50);
  
  if (x < -100) x += width + 200;
  if (y < -100) y += height + 200;
  if (x > width + 100) x -= width + 200;
  if (y > height + 100) y -= height + 200;

  history.push({x, y, c: colors[type], s: shapes[floor(random(3))] });
  
  // Keep only last 150 points for performance
  while(history.length > 150) {
    history.shift();
  }

  for (let i = history.length - 1; i >= 0; i--) {
    let p = history[i];
    
    // Fade out older points
    let alpha = map(i, 0, history.length, 20, 255);
    fill(p.c, alpha/2.5);
    
    if (p.s === 'circle') {
      ellipse(p.x, p.y, map(i, 0, history.length, 10, 40));
    } else if (p.s === 'square') {
      rectMode(CENTER);
      square(p.x, p.y, map(i, 0, history.length, 20, 60));
    } else {
      beginShape();
      vertex(p.x + cos(radians(135)) * map(i, 0, history.length, 20, 40), p.y + sin(radians(135)) * map(i, 0, history.length, 20, 40));
      vertex(p.x + cos(radians(-45)) * map(i, 0, history.length, 20, 40), p.y + sin(radians(-45)) * map(i, 0, history.length, 20, 40));
      vertex(p.x + cos(radians(180)) * map(i, 0, history.length, 20, 40), p.y + sin(radians(180)) * map(i, 0, history.length, 20, 40));
      endShape(CLOSE);
    }
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
        </script>
    </main>
</body>
</html>
