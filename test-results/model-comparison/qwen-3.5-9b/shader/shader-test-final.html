<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'none';">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <title>p5.js Sketch</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; }
        main { box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>
    <main>
        <script>
let cols = [];
const WIDTH = 800;
const HEIGHT = 600;
const NUM_PARTICLES = 3000;
const DENSITY_THRESHOLD = 5.0;

function setup() {
  createCanvas(WIDTH, HEIGHT);
  pixelDensity(1);
  colorMode(HSB, 360, 100, 100, 100);
  noStroke();
  noiseSeed(42);
  
  // Initialize columns with density values
  for (let i = 0; i < width + 1; i++) {
    cols.push(0);
  }
}

function windowResized() {
  resizeCanvas(WIDTH, HEIGHT);
  background(0);
  for (let i = 0; i < width + 1; i++) {
    cols[i] = 0;
  }
}

function draw() {
  // Fade effect to create trails
  fill(0, 20);
  noStroke();
  rect(0, 0, width, height);
  
  let hue = frameCount % 360;
  
  for (let x = 0; x < width; x++) {
    // Use noise to create organic wave patterns
    let n = map(noise(x * 0.015, frameCount * 0.02) + cols[x] * 0.01, -1, 1, 0, 1);
    
    // Emit particles based on noise intensity
    for (let i = 0; i < n * NUM_PARTICLES / width; i++) {
      let y = map(i, 0, n * NUM_PARTICLES / width, height, 0);
      
      // Add some randomness to position
      let px = x + random(-2, 2);
      let py = y + random(-2, 2);
      
      if (px >= 0 && px < width && py >= 0 && py < height) {
        cols[px]++;
        
        // Draw the particle with neon glow effect
        noStroke();
        fill(hue + frameCount * 2, 80, 100, 80);
        rect(px, py, 3, 3);
      }
    }
    
    // Decay density to prevent overflow
    cols[x] *= 0.95;
  }
}
        </script>
    </main>
</body>
</html>
