<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'none';">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <title>p5.js Sketch</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; }
        main { box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>
    <main>
        <script>
const BPM = 130;
let particles = [];
let frameCount = 0;
let beatFrame = 0;
let flowField = [];
let particleIndex = 0;

function Particle() {
  this.pos = createVector(random(width), random(height));
  this.vel = p5.Vector.random2D();
  this.acc = createVector(0, 0);
  this.maxSpeed = map(this.pos.x * 0.01, 0, width, 2, 8);
  this.size = random(3, 6);
  this.history = [];
  
  for(let i=0; i<5; i++) {
    this.history.push(this.pos.copy());
  }
}

Particle.prototype.update() {
  frameCount++;
  beatFrame = floor(frameCount * BPM / 60);
  
  // Beat pulse acceleration
  let pulse = sin(beatFrame * TWO_PI / 4) * 2;
  
  for(let i=0; i<this.history.length; i++) {
    this.pos.add(this.vel);
    
    let xMod = this.pos.x % width;
    let yMod = this.pos.y % height;
    
    if (this.pos.x > width || this.pos.x < 0) {
      this.pos.x = xMod === 0 ? 0 : width;
      this.vel.mult(-1);
    }
    if (this.pos.y > height || this.pos.y < 0) {
      this.pos.y = yMod === 0 ? 0 : height;
      this.vel.mult(-1);
    }
    
    // Flow field influence based on position and beat frame
    let angle = noise(this.pos.x * 0.01 + this.pos.y * 0.01 + beatFrame * 0.1) * TWO_PI * 4;
    this.vel.setMag(2);
    this.vel.setAngle(angle);
    
    // Beat impact
    if (frameCount % (60 / BPM) === 0) {
      let spread = noise(this.pos.x * 0.01 + frameCount * 0.1) * 10;
      this.vel.add(createVector(cos(frameCount * 0.2), sin(frameCount * 0.2)).mult(spread));
    }
    
    this.history.shift();
    this.history.push(this.pos.copy());
  }
}

Particle.prototype.show() {
  let beatMod = map(sin(beatFrame * TWO_PI / 4), -1, 1, 0, 2);
  strokeWeight(map(this.size, 3, 6) + beatMod);
  
  for(let i=0; i<this.history.length; i++) {
    let pos = this.history[i];
    
    // Color gradient based on noise and position
    let hueVal = map(noise(pos.x * 0.01 + pos.y * 0.01 + frameCount * 0.5), 0, 1, 180, 360);
    fill(hueVal + beatMod * 20, 255, 255);
    
    noStroke();
    circle(pos.x, pos.y, this.size * (i/this.history.length));
  }
}

function setup() {
  createCanvas(800, 600);
  pixelDensity(1);
  noFill();
  
  noiseSeed(4297153);
  
  // Initialize particles with random positions and velocities
  for (let i = 0; i < 400; i++) {
    particles.push(new Particle());
  }
}

function draw() {
  background(5, 5, 20, 10);
  
  for (let p of particles) {
    p.update();
    p.show();
  }
  
  // Draw beat visualizer at bottom
  if (frameCount % (60 / BPM) === 0) {
    fill(255, 100);
    noStroke();
    circle(width/2 + random(-10, 10), height - 50, random(20, 40));
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  background(0);
  noiseSeed(frameCount * 12345); // Change seed
}
        </script>
    </main>
</body>
</html>
