<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generated Output</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; }
        main { box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>
    <main>
        <script>
let shapes = [];
let numShapes = 15;
let t = 0;
let trailPositions = [];

function setup() {
  createCanvas(800, 600);
  pixelDensity(1);
  noiseSeed(99);
  
  for (let i = 0; i < numShapes; i++) {
    shapes.push({
      x: noise(i * 0.3) * width,
      y: noise(i * 0.3 + 50) * height,
      size: 15 + noise(i * 0.2) * 50,
      angle: noise(i * 0.4) * TWO_PI,
      speed: 0.002 + noise(i * 0.1) * 0.003,
      shapeType: floor(noise(i * 0.6) * 4),
      hue: noise(i * 0.25) * 360,
      trail: [],
      maxTrail: 30
    });
  }
}

function draw() {
  background(10, 10, 20, 40);
  
  for (let i = 0; i < shapes.length; i++) {
    let s = shapes[i];
    
    s.angle += s.speed;
    let angleOffset = noise(i * 0.5, t * 0.5) * TWO_PI;
    s.x += cos(s.angle + angleOffset) * 2;
    s.y += sin(s.angle + angleOffset) * 2;
    
    s.x = constrain(s.x, 0, width);
    s.y = constrain(s.y, 0, height);
    
    s.trail.push({x: s.x, y: s.y});
    if (s.trail.length > s.maxTrail) {
      s.trail.shift();
    }
    
    noFill();
    strokeWeight(1);
    beginShape();
    for (let j = 0; j < s.trail.length; j++) {
      let alpha = map(j, 0, s.trail.length, 0, 200);
      stroke(s.hue, 180, 255, alpha);
      vertex(s.trail[j].x, s.trail[j].y);
    }
    endShape();
    
    push();
    translate(s.x, s.y);
    rotate(s.angle);
    noStroke();
    colorMode(HSB, 360, 100, 100, 100);
    fill(s.hue, 70, 90, 85);
    
    if (s.shapeType === 0) {
      ellipse(0, 0, s.size, s.size);
    } else if (s.shapeType === 1) {
      rectMode(CENTER);
      rect(0, 0, s.size * 0.8, s.size * 0.8);
    } else if (s.shapeType === 2) {
      drawTriangle(0, 0, s.size * 0.6);
    } else {
      drawHexagon(0, 0, s.size * 0.5);
    }
    pop();
  }
  
  t += 0.01;
  colorMode(RGB, 255);
  
  for (let i = 0; i < shapes.length; i++) {
    let s = shapes[i];
    for (let j = i + 1; j < shapes.length; j++) {
      let other = shapes[j];
      let d = dist(s.x, s.y, other.x, other.y);
      if (d < 100) {
        let alpha = map(d, 0, 100, 60, 0);
        stroke(200, 220, 255, alpha);
        strokeWeight(0.5);
        line(s.x, s.y, other.x, other.y);
      }
    }
  }
}

function drawTriangle(x, y, r) {
  beginShape();
  for (let i = 0; i < 3; i++) {
    let angle = TWO_PI / 3 * i - HALF_PI;
    vertex(x + cos(angle) * r, y + sin(angle) * r);
  }
  endShape(CLOSE);
}

function drawHexagon(x, y, r) {
  beginShape();
  for (let i = 0; i < 6; i++) {
    let angle = TWO_PI / 6 * i;
    vertex(x + cos(angle) * r, y + sin(angle) * r);
  }
  endShape(CLOSE);
}

function windowResized() {
  resizeCanvas(800, 600);
}
        </script>
    </main>
</body>
</html>
