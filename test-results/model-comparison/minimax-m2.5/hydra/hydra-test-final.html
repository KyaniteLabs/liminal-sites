<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generated Output</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; }
        main { box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>
    <main>
        <script>
let shapes = [];
let numShapes = 15;
let trailAlpha = 0.08;

function setup() {
  createCanvas(800, 600);
  pixelDensity(1);
  colorMode(HSB, 360, 100, 100, 1);
  noiseSeed(42);
  
  for (let i = 0; i < numShapes; i++) {
    shapes.push({
      x: random(width),
      y: random(height),
      baseX: random(width),
      baseY: random(height),
      size: random(15, 50),
      type: floor(random(4)),
      hue: random(360),
      noiseOffset: random(1000),
      noiseScale: random(0.005, 0.015),
      rot: random(TWO_PI),
      rotSpeed: random(-0.03, 0.03)
    });
  }
  
  background(0);
}

function draw() {
  fill(0, 0, 0, trailAlpha);
  noStroke();
  rect(0, 0, width, height);
  
  for (let i = 0; i < shapes.length; i++) {
    let s = shapes[i];
    
    let noiseX = noise(s.noiseOffset + frameCount * s.noiseScale) * 2 - 1;
    let noiseY = noise(s.noiseOffset + 500 + frameCount * s.noiseScale) * 2 - 1;
    
    s.x += noiseX * 3;
    s.y += noiseY * 3;
    
    if (s.x < 0) s.x = width;
    if (s.x > width) s.x = 0;
    if (s.y < 0) s.y = height;
    if (s.y > height) s.y = 0;
    
    s.rot += s.rotSpeed;
    
    let hueShift = (s.hue + frameCount * 0.2) % 360;
    let sizePulse = s.size * (0.8 + noise(s.noiseOffset + frameCount * 0.02) * 0.4);
    
    push();
    translate(s.x, s.y);
    rotate(s.rot);
    
    stroke(hueShift, 80, 90, 0.7);
    strokeWeight(2);
    noFill();
    
    if (s.type === 0) {
      ellipse(0, 0, sizePulse, sizePulse);
    } else if (s.type === 1) {
      rectMode(CENTER);
      rect(0, 0, sizePulse, sizePulse, 4);
    } else if (s.type === 2) {
      let r = sizePulse / 2;
      triangle(0, -r, r * 0.866, r * 0.5, -r * 0.866, r * 0.5);
    } else {
      beginShape();
      for (let j = 0; j < 6; j++) {
        let angle = TWO_PI * j / 6;
        let px = cos(angle) * sizePulse / 2;
        let py = sin(angle) * sizePulse / 2;
        vertex(px, py);
      }
      endShape(CLOSE);
    }
    
    strokeWeight(1);
    stroke(hueShift, 60, 100, 0.4);
    if (s.type === 0) {
      ellipse(0, 0, sizePulse * 0.5, sizePulse * 0.5);
    } else if (s.type === 1) {
      rect(0, 0, sizePulse * 0.5, sizePulse * 0.5, 2);
    } else if (s.type === 2) {
      let r = sizePulse / 4;
      triangle(0, -r, r * 0.866, r * 0.5, -r * 0.866, r * 0.5);
    } else {
      beginShape();
      for (let j = 0; j < 6; j++) {
        let angle = TWO_PI * j / 6;
        let px = cos(angle) * sizePulse / 4;
        let py = sin(angle) * sizePulse / 4;
        vertex(px, py);
      }
      endShape(CLOSE);
    }
    
    pop();
  }
}

function windowResized() {
  resizeCanvas(800, 600);
  background(0);
}
        </script>
    </main>
</body>
</html>
