<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'none';">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <title>p5.js Sketch</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; }
        main { box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>
    <main>
        <script>
let time = 0;

function setup() {
  createCanvas(800, 600);
  pixelDensity(1);
  colorMode(HSB, 360, 100, 100);
}

function draw() {
  loadPixels();
  
  for (let x = 0; x < width; x++) {
    for (let y = 0; y < height; y++) {
      let nx = x / width;
      let ny = y / height;
      
      let n1 = noise(nx * 3 + time * 0.5, ny * 3, time * 0.3);
      let n2 = noise(nx * 5 - time * 0.4, ny * 5 + time * 0.4, time * 0.6);
      let n3 = noise(nx * 8 + time * 0.3 + sin(time * 0.2) * 2, ny * 8 - time * 0.5, time * 0.7);
      let n4 = noise(nx * 2 + cos(time * 0.15) * 3, ny * 2 + sin(time * 0.25) * 3, time * 0.4);
      
      let plasma = n1 * 0.4 + n2 * 0.3 + n3 * 0.2 + n4 * 0.1;
      
      let colorShift = sin(plasma * TWO_PI * 4 + time * 2) * 0.5 + 0.5;
      let hue = (plasma * 360 + time * 30 + colorShift * 120) % 360;
      
      let brightness = 85 + sin(plasma * TWO_PI * 6 + time * 3) * 15;
      let saturation = 100;
      
      let idx = (x + y * width) * 4;
      let rgb = hsbToRgb(hue, saturation, brightness);
      
      pixels[idx] = rgb.r;
      pixels[idx + 1] = rgb.g;
      pixels[idx + 2] = rgb.b;
    }
  }
  
  updatePixels();
  
  let glowLayer = createGraphics(width, height);
  glowLayer.loadPixels();
  
  for (let i = 0; i < 3; i++) {
    glowLayer.filter(BLUR, 8);
  }
  
  blendMode(ADD);
  tint(255, 30);
  image(glowLayer, 0, 0);
  blendMode(BLEND);
  tint(255, 255);
  
  time += 0.015;
}

function hsbToRgb(h, s, b) {
  h = h % 360;
  s = constrain(s, 0, 100) / 100;
  b = constrain(b, 0, 100) / 100;
  
  let c = b * s;
  let x = c * (1 - Math.abs((h / 60) % 2 - 1));
  let m = b - c;
  
  let r, g, bl;
  
  if (h < 60) { r = c; g = x; bl = 0; }
  else if (h < 120) { r = x; g = c; bl = 0; }
  else if (h < 180) { r = 0; g = c; bl = x; }
  else if (h < 240) { r = 0; g = x; bl = c; }
  else if (h < 300) { r = x; g = 0; bl = c; }
  else { r = c; g = 0; bl = x; }
  
  return {
    r: (r + m) * 255,
    g: (g + m) * 255,
    b: (bl + m) * 255
  };
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

function mouseMoved() {
  time += 0.02;
}
        </script>
    </main>
</body>
</html>
