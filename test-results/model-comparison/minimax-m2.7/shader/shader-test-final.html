<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generated Output</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; }
        main { box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>
    <main>
        <script>
let time = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  colorMode(HSB, 360, 100, 100, 100);
  noiseSeed(random(10000));
}

function draw() {
  background(0, 0, 8, 25);
  time += 0.02;
  
  blendMode(ADD);
  
  for (let x = 0; x < width; x += 4) {
    for (let y = 0; y < height; y += 4) {
      let n1 = noise(x * 0.003, y * 0.003, time);
      let n2 = noise(x * 0.007 + 100, y * 0.007 + 100, time * 1.3);
      let n3 = noise(x * 0.002 + 200, y * 0.002 + 200, time * 0.8);
      let n4 = noise(x * 0.01 + 300, y * 0.01 + 300, time * 2);
      
      let plasma = sin(n1 * PI * 4 + time * 2) * 0.35 +
                   sin(n2 * PI * 3 + time * 2.5) * 0.3 +
                   sin(n3 * PI * 2 + time * 1.5) * 0.2 +
                   (n4 - 0.5) * 0.3;
      
      let hue = (plasma * 180 + time * 80) % 360;
      let sat = 90 + sin(plasma * PI) * 10;
      let bri = 90 + sin(plasma * PI * 2) * 10;
      
      fill(hue, sat, bri, 60);
      noStroke();
      let size = 5 + plasma * 8;
      ellipse(x, y, size, size);
    }
  }
  
  blendMode(BLEND);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  noiseSeed(random(10000));
}
        </script>
    </main>
</body>
</html>
