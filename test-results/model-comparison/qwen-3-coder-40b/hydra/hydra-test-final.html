<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generated Output</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; }
        main { box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>
    <main>
        <script>
let t = 0;
let shapes = [];
let hueOffset = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);
  background(10);
}

function draw() {
  // Dynamic fade for trails
  let fadeAlpha = map(sin(t * 0.5), -1, 1, 30, 80);
  fill(10, fadeAlpha);
  rect(0, 0, width, height);

  t += 0.02;
  hueOffset = (hueOffset + 0.5) % 360;

  // Add new shapes
  if (frameCount % 4 === 0) {
    let x = random(width * 0.1, width * 0.9);
    let y = random(height * 0.1, height * 0.9);
    let size = random(20, 80);
    shapes.push({
      x: x,
      y: y,
      size: size,
      angle: random(TWO_PI),
      speed: random(0.05, 0.2),
      hue: (hueOffset + random(-30, 30)) % 360,
      type: floor(random(3)) // 0: circle, 1: square, 2: triangle
    });
  }

  // Draw and animate shapes
  for (let i = shapes.length - 1; i >= 0; i--) {
    let s = shapes[i];
    
    // Update shape properties
    s.angle += s.speed;
    s.x += sin(t + s.angle) * 2;
    s.y += cos(t + s.angle) * 2;
    
    // Wrap around screen
    if (s.x < -50) s.x = width + 50;
    if (s.x > width + 50) s.x = -50;
    if (s.y < -50) s.y = height + 50;
    if (s.y > height + 50) s.y = -50;
    
    // Draw shape with vibrant colors
    let h = (s.hue + t * 20) % 360;
    fill(h, 80, 90);
    noStroke();
    
    push();
    translate(s.x, s.y);
    rotate(t + s.angle);
    
    switch(s.type) {
      case 0: // Circle
        circle(0, 0, s.size);
        break;
      case 1: // Square
        rect(-s.size/2, -s.size/2, s.size, s.size);
        break;
      case 2: // Triangle
        triangle(0, -s.size/2, -s.size/2, s.size/2, s.size/2, s.size/2);
        break;
    }
    pop();
    
    // Remove shapes that are too old (keep performance)
    if (frameCount > 500 && i > 100) {
      shapes.splice(i, 1);
    }
  }
}

function windowResize() {
  resizeCanvas(windowWidth, windowHeight);
}
        </script>
    </main>
</body>
</html>
