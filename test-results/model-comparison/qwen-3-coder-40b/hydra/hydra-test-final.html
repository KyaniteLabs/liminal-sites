<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generated Output</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; }
        main { box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>
    <main>
        <script>
let t = 0;
let hueVal;

function setup() {
  createCanvas(windowWidth, windowHeight);
  background(10);
}

function draw() {
  fill(0, 30);
  rect(0, 0, width, height);
  
  t += 0.02;
  hueVal = (t * 50) % 360;
  stroke(hueVal, 80, 100);
  noFill();
  strokeWeight(2);
  
  const centerX = width / 2 + cos(t * 0.8) * (width * 0.2);
  const centerY = height / 2 + sin(t * 0.6) * (height * 0.2);
  
  // Rotate coordinate system
  translate(centerX, centerY);
  rotate(t);
  
  // Draw rotating geometric shapes with trails
  for(let i = 0; i < 5; i++) {
    const size = 80 + i * 30;
    strokeWeight(1 + i % 2);
    
    if (i % 2 === 0) {
      // Square rotation
      rect(-size/2, -size/2, size, size);
    } else {
      // Circle rotation
      ellipse(0, 0, size, size);
    }
    
    rotate(PI / 4);
  }
  
  // Add a dynamic triangle that changes size
  resetTransform();
  const triSize = 100 + sin(t * 2) * 50;
  fill(hueVal, 70, 60, 30);
  noStroke();
  triangle(
    width/2, height/2 - triSize,
    width/2 - triSize * 0.866, height/2 + triSize * 0.5,
    width/2 + triSize * 0.866, height/2 + triSize * 0.5
  );
  
  // Add a small interactive circle that follows mouse
  noFill();
  strokeWeight(3);
  stroke((hueVal + 180) % 360, 90, 100);
  ellipse(mouseX, mouseY, 40 + sin(t * 5) * 20, 40 + sin(t * 5) * 20);
}
        </script>
    </main>
</body>
</html>
